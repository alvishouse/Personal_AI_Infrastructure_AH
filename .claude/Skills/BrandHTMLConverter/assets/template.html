<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta name="keywords" content="{{KEYWORDS}}">
    <meta name="author" content="{{AUTHOR}}">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:type" content="article">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Paste contents of brand-styles.css here or link externally */
        {{STYLES}}
    </style>
</head>
<body>

<article>
    <!-- Article Header -->
    <header class="article-header">
        <p class="eyebrow">{{EYEBROW}}</p>
        <h1>{{HEADLINE}}</h1>
        <p class="subtitle">{{SUBTITLE}}</p>
        <p class="meta">By <strong>{{AUTHOR}}</strong> | {{DATE}} | {{READ_TIME}} min read</p>
    </header>

    {{CONTENT}}

    <!-- Author Box -->
    <div class="author-box">
        <div class="author-info">
            <h4>About the Author</h4>
            <p><strong>{{AUTHOR}}</strong> {{AUTHOR_BIO}}</p>
            <p style="margin-top: 1em;"><em>{{AUTHOR_CTA}}</em></p>
        </div>
    </div>

</article>

</body>
</html>
