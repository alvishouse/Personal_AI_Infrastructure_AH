<!DOCTYPE html>
<html><head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body {
      width:800px; height:380px;
      background:#ede5d0;
      display:flex; align-items:center; justify-content:center;
      font-family:'Montserrat','Helvetica Neue',Arial,sans-serif;
    }
  </style>
</head><body>
<svg width="762" height="352" viewBox="0 0 762 352" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="ruled" width="762" height="32" patternUnits="userSpaceOnUse">
      <line x1="0" y1="31" x2="762" y2="31" stroke="rgba(59,84,107,.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Paper background -->
  <rect width="762" height="352" fill="#f6efd8" rx="6"/>
  <rect width="762" height="352" fill="none" stroke="rgba(59,84,107,.32)" stroke-width="2" rx="6"/>
  <rect x="5" y="5" width="752" height="342" fill="none" stroke="rgba(59,84,107,.1)" stroke-width="4" rx="3"/>
  <rect width="762" height="352" fill="url(#ruled)"/>

  <!-- Header -->
  <text x="381" y="34" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="27" font-weight="800" letter-spacing="3" fill="#3b546b">THE REFINERY PRINCIPLE</text>
  <text x="381" y="53" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="19" letter-spacing="0.8" fill="#3b546b">WHERE AI VALUE IS CAPTURED — OR PERMANENTLY LOST</text>
  <line x1="40" y1="66" x2="722" y2="66" stroke="rgba(59,84,107,.28)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- === LEFT SIDE: The Missing Refinery === -->

  <!-- Crude barrel (top input) -->
  <rect x="60" y="82" width="120" height="38" fill="rgba(59,84,107,.08)" stroke="#3b546b" stroke-width="1.6" rx="4"/>
  <text x="120" y="97" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="700" fill="#3b546b" letter-spacing="0.5">AI MODEL OUTPUT</text>
  <text x="120" y="112" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" fill="rgba(59,84,107,.7)" letter-spacing="0.4">Claude · GPT · Copilot</text>

  <!-- Arrow down from crude -->
  <line x1="120" y1="120" x2="120" y2="145" stroke="rgba(59,84,107,.5)" stroke-width="1.8" stroke-dasharray="4 3"/>
  <polygon points="120 152 115 142 125 142" fill="rgba(59,84,107,.5)"/>

  <!-- Missing layer (dashed red box) -->
  <rect x="58" y="155" width="124" height="52" fill="rgba(207,88,40,.05)" stroke="#cf5828" stroke-width="1.5" stroke-dasharray="5 3" rx="4"/>
  <text x="120" y="175" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#cf5828" letter-spacing="0.5">WORKFLOW</text>
  <text x="120" y="191" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#cf5828" letter-spacing="0.5">LAYER</text>
  <text x="120" y="203" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#cf5828" letter-spacing="0.3">MISSING</text>

  <!-- X over missing layer -->
  <line x1="70" y1="162" x2="170" y2="200" stroke="rgba(207,88,40,.4)" stroke-width="1.5"/>
  <line x1="170" y1="162" x2="70" y2="200" stroke="rgba(207,88,40,.4)" stroke-width="1.5"/>

  <!-- Arrow down (dashed/broken) -->
  <line x1="120" y1="207" x2="120" y2="232" stroke="rgba(207,88,40,.4)" stroke-width="1.8" stroke-dasharray="3 3"/>
  <polygon points="120 239 115 229 125 229" fill="rgba(207,88,40,.4)"/>

  <!-- Nothing / browser tab box -->
  <rect x="60" y="242" width="120" height="36" fill="rgba(207,88,40,.05)" stroke="rgba(207,88,40,.4)" stroke-width="1.2" stroke-dasharray="5 3" rx="4"/>
  <text x="120" y="257" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" fill="#cf5828" font-weight="700" letter-spacing="0.3">BROWSER TAB</text>
  <text x="120" y="271" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#cf5828" letter-spacing="0.3">Sits unread</text>

  <!-- Label -->
  <text x="120" y="300" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#cf5828">80% OF ORGS</text>
  <text x="120" y="316" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" fill="#2b2b2b">No conversion layer</text>
  <text x="120" y="331" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" fill="rgba(59,84,107,.6)">95% pilot failure rate</text>

  <!-- Center divider -->
  <line x1="330" y1="76" x2="330" y2="340" stroke="rgba(59,84,107,.12)" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Center arrow badge -->
  <text x="381" y="196" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="30" font-weight="800" fill="#3b546b">→</text>
  <text x="381" y="218" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#cf5828" letter-spacing="1">BUILD THE</text>
  <text x="381" y="234" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#cf5828" letter-spacing="1">REFINERY</text>

  <!-- === RIGHT SIDE: With the Refinery === -->

  <!-- AI output box -->
  <rect x="582" y="82" width="120" height="38" fill="rgba(59,84,107,.08)" stroke="#3b546b" stroke-width="1.6" rx="4"/>
  <text x="642" y="97" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="700" fill="#3b546b" letter-spacing="0.5">AI MODEL OUTPUT</text>
  <text x="642" y="112" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" fill="rgba(59,84,107,.7)" letter-spacing="0.4">Claude · GPT · Copilot</text>

  <!-- Arrow down -->
  <line x1="642" y1="120" x2="642" y2="145" stroke="#3b546b" stroke-width="1.8"/>
  <polygon points="642 152 637 142 647 142" fill="#3b546b"/>

  <!-- Refinery layer (solid ink) -->
  <rect x="580" y="155" width="124" height="52" fill="rgba(59,84,107,.1)" stroke="#3b546b" stroke-width="1.8" rx="4"/>
  <text x="642" y="175" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#3b546b" letter-spacing="0.5">WORKFLOW</text>
  <text x="642" y="191" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#3b546b" letter-spacing="0.5">REFINERY</text>
  <!-- check -->
  <path d="M718 171 L723 176 L732 164" fill="none" stroke="#3b546b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow down (solid) -->
  <line x1="642" y1="207" x2="642" y2="232" stroke="#3b546b" stroke-width="1.8"/>
  <polygon points="642 239 637 229 647 229" fill="#3b546b"/>

  <!-- Business decision box -->
  <rect x="582" y="242" width="120" height="36" fill="rgba(59,84,107,.1)" stroke="#3b546b" stroke-width="1.8" rx="4"/>
  <text x="642" y="257" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="700" fill="#3b546b" letter-spacing="0.3">BUSINESS DECISION</text>
  <text x="642" y="271" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#3b546b" letter-spacing="0.3">Tracked · Measured</text>

  <!-- Label -->
  <text x="642" y="300" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#3b546b">TOP 10%</text>
  <text x="642" y="316" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" fill="#2b2b2b">Industrializers</text>
  <text x="642" y="331" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" fill="rgba(59,84,107,.6)">Consistent AI returns</text>

  <!-- Issue caption -->
  <text x="381" y="348" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="14" letter-spacing="0.8" fill="rgba(59,84,107,.6)">Mid-Market AI Playbook  ·  Issue #5  ·  April 2026</text>
</svg>
</body></html>
