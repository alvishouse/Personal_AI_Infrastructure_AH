<!DOCTYPE html>
<html><head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body {
      width:800px; height:380px;
      background:#ede5d0;
      display:flex; align-items:center; justify-content:center;
      font-family:'Montserrat','Helvetica Neue',Arial,sans-serif;
    }
    .paper {
      width:762px; height:352px;
      background:#f6efd8;
      border:2px solid rgba(59,84,107,.32);
      border-radius:6px;
      box-shadow:
        inset 0 0 0 5px #ede5d0,
        inset 0 0 0 7px rgba(59,84,107,.1),
        3px 4px 14px rgba(59,84,107,.2);
      display:flex; flex-direction:column; overflow:hidden;
      position:relative;
    }
    .paper::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background:repeating-linear-gradient(180deg,transparent,transparent 31px,rgba(59,84,107,.045) 31px,rgba(59,84,107,.045) 32px);
    }
    .hdr {
      text-align:center; padding:10px 20px 7px;
      border-bottom:1px dashed rgba(59,84,107,.28);
      position:relative; z-index:1;
    }
    .hdr h2 {
      font-size:26px; font-weight:800; letter-spacing:.28em;
      text-transform:uppercase; color:#3b546b;
    }
    .hdr p {
      font-size:17px; letter-spacing:.1em; text-transform:uppercase;
      color:#3b546b; margin-top:3px;
    }
    .body { display:flex; flex:1; position:relative; z-index:1; }
    .col {
      flex:1; padding:12px 20px 10px;
      display:flex; flex-direction:column; align-items:center; text-align:center;
    }
    .col-myth { border-right:1px dashed rgba(59,84,107,.22); }
    .lbl {
      display:flex; align-items:center; gap:7px;
      font-size:21px; font-weight:700; letter-spacing:.18em;
      text-transform:uppercase; margin-bottom:9px;
    }
    .lbl-myth { color:#cf5828; }
    .lbl-reality { color:#3b546b; }
    .ibox {
      width:68px; height:68px;
      border:1.5px solid rgba(59,84,107,.2); border-radius:8px;
      background:rgba(255,255,255,.5);
      display:flex; align-items:center; justify-content:center;
      margin-bottom:9px;
    }
    .claim { font-size:21px; font-weight:600; color:#2b2b2b; line-height:1.45; margin-bottom:8px; }
    .note { font-size:16px; color:#3b546b; letter-spacing:.05em; line-height:1.45; }
    .stat { font-size:28px; font-weight:800; color:#3b546b; margin-bottom:4px; }
    .stat-myth { color:#cf5828; }
    .vs {
      width:44px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(59,84,107,.03);
    }
    .vs-badge {
      width:34px; height:34px; border-radius:50%;
      border:2px solid rgba(59,84,107,.3);
      display:flex; align-items:center; justify-content:center;
      font-size:17px; font-weight:800; color:#3b546b;
      background:#f6efd8; letter-spacing:.03em;
    }
  </style>
</head><body>
<div class="paper">
  <div class="hdr">
    <h2>MYTH &nbsp; · &nbsp; vs. &nbsp; · &nbsp; REALITY</h2>
    <p>The Driller's Fallacy &nbsp;—&nbsp; Mid-Market AI Playbook · Issue #5</p>
  </div>
  <div class="body">

    <!-- MYTH -->
    <div class="col col-myth">
      <div class="lbl lbl-myth">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="#cf5828" stroke-width="2.4" stroke-linecap="round">
          <line x1="13" y1="3" x2="3" y2="13"/><line x1="3" y1="3" x2="13" y2="13"/>
        </svg>
        THE MYTH
      </div>
      <div class="ibox">
        <!-- Drilling rig = wrong layer fight -->
        <svg viewBox="0 0 68 68" width="64" height="64" fill="none" stroke="#cf5828" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <!-- Robot/model icon with X -->
          <rect x="18" y="22" width="32" height="28" rx="4"/>
          <circle cx="28" cy="34" r="4"/>
          <circle cx="40" cy="34" r="4"/>
          <line x1="28" y1="22" x2="28" y2="16"/>
          <line x1="40" y1="22" x2="40" y2="16"/>
          <line x1="34" y1="50" x2="34" y2="56"/>
          <!-- X overlay = myth -->
          <line x1="14" y1="14" x2="54" y2="54" stroke-width="2.2" stroke-dasharray="3 2"/>
          <line x1="54" y1="14" x2="14" y2="54" stroke-width="2.2" stroke-dasharray="3 2"/>
          <text x="34" y="64" text-anchor="middle" font-size="7" fill="#cf5828" font-family="Montserrat" font-weight="700" stroke="none" letter-spacing="0.5">WRONG LAYER</text>
        </svg>
      </div>
      <div class="claim">"We need a better<br>AI model."</div>
      <div class="note stat-myth" style="font-size:13px;margin-top:4px;">
        95% of AI pilots fail<br>regardless of model quality
      </div>
    </div>

    <!-- VS -->
    <div class="vs"><div class="vs-badge">vs</div></div>

    <!-- REALITY -->
    <div class="col">
      <div class="lbl lbl-reality">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="#3b546b" stroke-width="2.4" stroke-linecap="round">
          <polyline points="2 8 6 12 14 4"/>
        </svg>
        THE REALITY
      </div>
      <div class="ibox">
        <!-- Workflow/pipeline = right layer -->
        <svg viewBox="0 0 68 68" width="64" height="64" fill="none" stroke="#3b546b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <!-- Stacked layers = refinery -->
          <rect x="14" y="44" width="40" height="10" rx="2"/>
          <rect x="14" y="30" width="40" height="10" rx="2" fill="rgba(59,84,107,.12)"/>
          <rect x="14" y="16" width="40" height="10" rx="2"/>
          <!-- Arrows up through layers -->
          <line x1="34" y1="44" x2="34" y2="40"/>
          <line x1="34" y1="30" x2="34" y2="26"/>
          <polygon points="34 15 30 23 38 23" fill="#3b546b" stroke="none"/>
          <text x="34" y="64" text-anchor="middle" font-size="7" fill="#3b546b" font-family="Montserrat" font-weight="700" stroke="none" letter-spacing="0.5">REFINERY LAYER</text>
        </svg>
      </div>
      <div class="claim">"We need a workflow<br>conversion layer."</div>
      <div class="note" style="font-size:13px;margin-top:4px;color:#3b546b;font-weight:700;">
        Only 21% have redesigned<br>any workflows for AI
      </div>
    </div>

  </div>
</div>
</body></html>
