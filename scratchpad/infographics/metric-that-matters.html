<!DOCTYPE html>
<html><head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body {
      width:800px; height:380px;
      background:#ede5d0;
      display:flex; align-items:center; justify-content:center;
      font-family:'Montserrat','Helvetica Neue',Arial,sans-serif;
    }
  </style>
</head><body>
<svg width="762" height="352" viewBox="0 0 762 352" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="ruled" width="762" height="32" patternUnits="userSpaceOnUse">
      <line x1="0" y1="31" x2="762" y2="31" stroke="rgba(59,84,107,.045)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Paper background -->
  <rect width="762" height="352" fill="#f6efd8" rx="6"/>
  <rect width="762" height="352" fill="none" stroke="rgba(59,84,107,.32)" stroke-width="2" rx="6"/>
  <rect x="5" y="5" width="752" height="342" fill="none" stroke="rgba(59,84,107,.1)" stroke-width="4" rx="3"/>
  <rect width="762" height="352" fill="url(#ruled)"/>

  <!-- Header -->
  <text x="381" y="36" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="27" font-weight="800" letter-spacing="3" fill="#3b546b">WORKFLOW REDESIGN RATE</text>
  <text x="381" y="55" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="19" letter-spacing="0.8" fill="#3b546b">McKINSEY 2025 STATE OF AI  —  MID-MARKET AI PLAYBOOK · ISSUE #5</text>
  <line x1="40" y1="68" x2="722" y2="68" stroke="rgba(59,84,107,.28)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Baseline -->
  <line x1="90" y1="290" x2="672" y2="290" stroke="rgba(59,84,107,.45)" stroke-width="1.5"/>

  <!-- AI LEADERS bar: 55% — proportional height ~170, top y=120 -->
  <rect x="100" y="120" width="200" height="170" fill="#3b546b" rx="6 6 0 0"/>
  <!-- Large stat inside bar -->
  <text x="200" y="193" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="90" font-weight="800" fill="white">55%</text>
  <text x="200" y="218" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,.9)" letter-spacing="1">REDESIGN THEIR WORKFLOWS</text>

  <!-- Labels below baseline -->
  <text x="200" y="306" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="18" font-weight="700" letter-spacing="1.5" fill="#3b546b">AI LEADERS</text>
  <text x="200" y="322" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="15" fill="#2b2b2b">Consistent P&amp;L impact</text>
  <text x="200" y="338" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" fill="rgba(59,84,107,.7)">top performers</text>

  <!-- AI LAGGARDS bar: 18% — height ~56, top y=234 -->
  <rect x="462" y="234" width="200" height="56" fill="rgba(59,84,107,.25)" stroke="rgba(59,84,107,.5)" stroke-width="1.5" rx="6 6 0 0"/>
  <text x="562" y="268" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="68" font-weight="800" fill="rgba(59,84,107,.85)">18%</text>

  <!-- Labels below baseline -->
  <text x="562" y="306" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="18" font-weight="700" letter-spacing="1.5" fill="#3b546b">AI LAGGARDS</text>
  <text x="562" y="322" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="15" fill="#2b2b2b">Flat results despite spend</text>
  <text x="562" y="338" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" fill="rgba(59,84,107,.7)">most organizations</text>

  <!-- Gap bracket -->
  <line x1="381" y1="120" x2="381" y2="234" stroke="rgba(59,84,107,.35)" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="373" y1="120" x2="389" y2="120" stroke="rgba(59,84,107,.45)" stroke-width="1.5"/>
  <line x1="373" y1="234" x2="389" y2="234" stroke="rgba(59,84,107,.45)" stroke-width="1.5"/>
  <!-- Gap badge -->
  <rect x="320" y="166" width="122" height="26" fill="#f6efd8" stroke="#cf5828" stroke-width="1.8" rx="4"/>
  <text x="381" y="179" text-anchor="middle" dominant-baseline="middle" font-family="Montserrat,sans-serif" font-size="17" font-weight="800" letter-spacing="1" fill="#cf5828">3× REDESIGN GAP</text>

  <!-- Supporting stat badge -->
  <rect x="270" y="76" width="222" height="22" fill="rgba(207,88,40,.08)" stroke="rgba(207,88,40,.3)" stroke-width="1" rx="3"/>
  <text x="381" y="88" text-anchor="middle" dominant-baseline="middle" font-family="Montserrat,sans-serif" font-size="13" fill="#cf5828" font-weight="700" letter-spacing="0.5">Only 21% of orgs redesign any workflow</text>
</svg>
</body></html>
