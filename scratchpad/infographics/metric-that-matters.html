<!DOCTYPE html>
<html><head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body {
      width:800px; height:380px;
      background:#ede5d0;
      display:flex; align-items:center; justify-content:center;
      font-family:'Montserrat','Helvetica Neue',Arial,sans-serif;
    }
  </style>
</head><body>
<svg width="762" height="352" viewBox="0 0 762 352" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="ruled" width="762" height="32" patternUnits="userSpaceOnUse">
      <line x1="0" y1="31" x2="762" y2="31" stroke="rgba(59,84,107,.045)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Paper background -->
  <rect width="762" height="352" fill="#f6efd8" rx="6"/>
  <rect width="762" height="352" fill="none" stroke="rgba(59,84,107,.32)" stroke-width="2" rx="6"/>
  <rect x="5" y="5" width="752" height="342" fill="none" stroke="rgba(59,84,107,.1)" stroke-width="4" rx="3"/>
  <rect width="762" height="352" fill="url(#ruled)"/>

  <!-- Header -->
  <text x="381" y="36" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="27" font-weight="800" letter-spacing="3" fill="#3b546b">DATA GOVERNANCE ROI GAP</text>
  <text x="381" y="55" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="19" letter-spacing="0.8" fill="#3b546b">INDUSTRY RESEARCH 2025  —  MID-MARKET AI PLAYBOOK · ISSUE #12</text>
  <line x1="40" y1="68" x2="722" y2="68" stroke="rgba(59,84,107,.28)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Baseline -->
  <line x1="90" y1="290" x2="672" y2="290" stroke="rgba(59,84,107,.45)" stroke-width="1.5"/>

  <!-- WITH GOVERNANCE bar: 24% revenue — height ~185, top y=105 -->
  <rect x="100" y="105" width="190" height="185" fill="#3b546b" rx="6 6 0 0"/>
  <!-- Large stat inside bar -->
  <text x="195" y="170" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="86" font-weight="800" fill="white">24%</text>
  <text x="195" y="193" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,.9)" letter-spacing="1">REVENUE IMPROVEMENT</text>
  <text x="195" y="212" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" fill="rgba(255,255,255,.8)" letter-spacing="0.5">+ 25% COST SAVINGS</text>

  <!-- Labels below baseline -->
  <text x="195" y="306" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="18" font-weight="700" letter-spacing="1.5" fill="#3b546b">WITH GOVERNANCE</text>
  <text x="195" y="322" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="16" fill="#2b2b2b">Mature data infrastructure</text>
  <text x="195" y="338" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="14" fill="rgba(59,84,107,.7)">only 15% of orgs</text>

  <!-- WITHOUT GOVERNANCE bar: 0% — flat line only -->
  <rect x="480" y="278" width="190" height="12" fill="none" stroke="rgba(59,84,107,.45)" stroke-width="1.5" stroke-dasharray="5 3" rx="2 2 0 0"/>
  <text x="575" y="272" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="64" font-weight="800" fill="#3b546b" opacity="0.45">0%</text>
  <text x="575" y="257" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" fill="rgba(59,84,107,.6)" letter-spacing="0.5">NO MEASURABLE RETURN</text>

  <!-- Labels below baseline -->
  <text x="575" y="306" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="18" font-weight="700" letter-spacing="1.5" fill="#3b546b">WITHOUT GOVERNANCE</text>
  <text x="575" y="322" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="16" fill="#2b2b2b">Ad hoc data practices</text>
  <text x="575" y="338" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="14" fill="rgba(59,84,107,.7)">85% of orgs</text>

  <!-- Gap bracket -->
  <line x1="381" y1="105" x2="381" y2="278" stroke="rgba(59,84,107,.35)" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="373" y1="105" x2="389" y2="105" stroke="rgba(59,84,107,.45)" stroke-width="1.5"/>
  <line x1="373" y1="278" x2="389" y2="278" stroke="rgba(59,84,107,.45)" stroke-width="1.5"/>
  <!-- Gap badge -->
  <rect x="327" y="179" width="108" height="26" fill="#f6efd8" stroke="#cf5828" stroke-width="1.8" rx="4"/>
  <text x="381" y="192" text-anchor="middle" dominant-baseline="middle" font-family="Montserrat,sans-serif" font-size="17" font-weight="800" letter-spacing="1" fill="#cf5828">24-POINT GAP</text>

  <!-- Supporting stat: 96% hit data quality problems -->
  <rect x="290" y="76" width="182" height="22" fill="rgba(207,88,40,.08)" stroke="rgba(207,88,40,.3)" stroke-width="1" rx="3"/>
  <text x="381" y="88" text-anchor="middle" dominant-baseline="middle" font-family="Montserrat,sans-serif" font-size="13" fill="#cf5828" font-weight="700" letter-spacing="0.5">96% of orgs hit data quality problems</text>
</svg>
</body></html>
