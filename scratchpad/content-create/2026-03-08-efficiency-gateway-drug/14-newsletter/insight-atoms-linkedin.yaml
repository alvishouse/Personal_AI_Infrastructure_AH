  - insight_atom:
      id: "atom-004"
      source: "LinkedIn Posts - Authority Post, Case Study Post"
      source_url: "Campaign: Efficiency Gateway Drug"

      headline: "The $320M difference between saving and reinvesting"
      insight: "Booking Holdings saved $150M through AI efficiency, then immediately reinvested $170M into connected trip platform and fintech offerings. Their CFO modeled the reinvestment before the savings arrived. Result: gross bookings up 10%, revenue up 11%, EBITDA up 17%. JPMorgan saved 360,000 work hours with their COiN platform and redirected that capacity toward building IndexGPT — an entirely new AI-driven investment product. Companies treating freed capacity as venture capital outperform 3.6x (BCG)."
      evidence: "Booking Holdings: $150M AI savings + $170M reinvestment = 10-11% revenue growth. JPMorgan: 360,000 work hours freed from COiN → redirected to IndexGPT product development. BCG 1,800-company study: 'future-built' reinvestment companies achieve 3.6x greater three-year TSR and 1.7x revenue growth vs. efficiency-only laggards."
      so_what: "The multiplier is real. Companies that treat freed capacity as innovation capital don't just win on innovation — they win on cost metrics too. The efficiency-only playbook doesn't even win on its own terms."
      action_step: "Model your Capacity Dividend as venture capital. If AI frees 5.7 hours per 50-person team, that's $750K-$1.5M annual capital. Before releasing that capital as profit, allocate 30-40% to one new customer-facing capability or market expansion. Document the reinvestment thesis. Track revenue impact at 90-day mark."

