  - insight_atom:
      id: "atom-002"
      source: "LinkedIn Posts - Authority Post, Stats Post"
      source_url: "Campaign: Efficiency Gateway Drug"

      headline: "21,000 hours vanish every year in your AI deployment"
      insight: "McKinsey found AI frees 5.7 hours per employee per week. But HBR found where that time goes: 83% of users who save time waste at least a quarter of it. In a 100-person company, that's 30,000 hours freed annually — but 21,000 hours absorbed into low-value work (more meetings, more email, same tasks at higher volume). The capacity dividend exists. Nobody invested it."
      evidence: "McKinsey: 5.7 hours freed per employee weekly. HBR: 83% waste ≥25% of freed time; among managers, 36% waste >50%. Math: 100-person company = 30,000 hours/year freed. 21,000 hours = zero value created. Not a technology failure. A measurement failure."
      so_what: "You're sitting on $500K-$2M in invisible annual capacity (21,000 hours × fully loaded cost) that's being consumed by default, not decision. That's margin you're leaving on the table — or innovation capital you're not deploying."
      action_step: "Calculate your freed capacity number this week. AI tools deployed × hours saved per week × team size × 52 weeks = annual dividend. Assign a fully loaded dollar value (salary + benefits ÷ 2000 work hours). Present it to leadership as available investment capital, not cost savings."

      quality_scores:
        shareability: 5
        novelty: 4
        actionability: 5

      classification:
        content_pillar: "Operations"
        newsletter_section_fit: "TL;DR"
        funnel_position: "Middle"

