  - insight_atom:
      id: "atom-006"
      source: "LinkedIn Posts - Quick Win Post"
      source_url: "Campaign: Efficiency Gateway Drug"

      headline: "Your 4-week Capacity Dividend transformation plan"
      insight: "Most AI strategies fail in week 5 because nobody planned what to do with the freed time. Here's a 4-week implementation plan: Week 1 - Run the audit (calculate freed hours, assign dollar value, present as capital). Week 2 - Write the reinvestment thesis (one page, three sentences: 'We redirect X hours toward Y, creating Z value'). Week 3 - Pilot the numerator play (one team, one customer-facing project, four weeks). Week 4 - Build the new dashboard (track revenue from freed-capacity initiatives, not just cost savings). No extra budget. No new vendors. One month. Four decisions."
      evidence: "McKinsey: AI frees 5.7 hours per employee weekly. Week 1 math: 50-person team = 14,820 hours/year = $750K-$1.5M in fully loaded costs. Booking Holdings applied decision-first approach: modeled $170M reinvestment before $150M in savings arrived. Result measurable in Q1 revenue impact. Week 3 pilot structure prevents cost creep and validates the numerator play before scaling."
      so_what: "You don't need a 6-month transformation. You need four decisions in four weeks. This plan is repeatable, requires no external dependencies, and gives you proof of concept before you scale."
      action_step: "Start Week 1 Monday. Schedule 60-minute audit with your ops team. Calculate freed hours, assign dollar value to that capacity, present the number to your CFO as 'available capital.' That single conversation shifts how your organization thinks about AI ROI for the next 12 months."

      quality_scores:
