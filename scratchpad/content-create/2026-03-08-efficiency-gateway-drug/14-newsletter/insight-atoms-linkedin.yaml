  - insight_atom:
      id: "atom-005"
      source: "LinkedIn Posts - Framework Post"
      source_url: "Campaign: Efficiency Gateway Drug"

      headline: "The 4-step framework that stops the efficiency treadmill"
      insight: "83% of companies deploy AI, see the time savings, then watch it vanish into more meetings and email. The missing piece is a four-step system: (1) Audit the freed capacity across all tools and teams. (2) Decide before you deploy—what will you build? (3) Reinvest freed human capacity into output value, not input optimization. (4) Change the dashboard—measure what you built, not just what you saved. This framework turns every efficiency win into startup capital."
      evidence: "McKinsey: AI frees 5.7 hours per employee weekly. Framework example: In a 50-person team = 14,820 hours annually. Booking Holdings applied this framework: modeled reinvestment before savings arrived. Result: $1.2M new revenue from AI-funded customer platform in their QBR metrics. Companies following this pattern (BCG) achieve 3.6x greater shareholder return."
      so_what: "Without a framework, your freed capacity disappears. With one, it becomes the capital that funds your next competitive advantage. This is the difference between running a treadmill and building a springboard."
      action_step: "Take the audit step this week (60 minutes). List every AI tool deployed, quantify freed hours per person per week, multiply by team size and 52 weeks. Assign a dollar value. Present it to leadership as 'available investment capital' at your next ops meeting. Don't present it as 'cost savings.'"

      quality_scores:
        shareability: 5
        novelty: 4
        actionability: 5

      classification:
