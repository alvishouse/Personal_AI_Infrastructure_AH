  - insight_atom:
      id: "atom-003"
      source: "LinkedIn Posts - Story Post, Case Study Post"
      source_url: "Campaign: Efficiency Gateway Drug"

      headline: "What two distribution companies learned from the same AI tools"
      insight: "Company A deployed AI, saved time, presented cost metrics. CEO asked: 'What are we doing differently for customers?' No answer. Freed capacity absorbed into higher volume of the same work. Company B asked the same question before deployment. Answer: customer-facing logistics dashboard. Result: won market share on service differentiation, not price. The difference was one question asked at the right time."
      evidence: "Company A case study: processing time dropped 40%, freed capacity vanished into volume work within 6 months, competitive position unchanged. Company B case study: redirected freed hours to new service offering within 12 months, won accounts on differentiation. Booking Holdings example: modeled $170M reinvestment before $150M in AI savings arrived, resulting in 11% revenue growth year-over-year."
      so_what: "Your AI deployment succeeds or fails before you deploy anything. The decision point is not 'how much will we save' but 'what will we build with the freed capacity.' Miss that timing, and you lose both the innovation and the efficiency advantage."
      action_step: "Before your next AI project kickoff, write one page: 'We will redirect X hours of freed capacity toward Y customer-facing initiative, creating Z value.' Get CFO and product sign-off on the reinvestment thesis alongside the efficiency budget. Make the decision first. Deploy second."

      quality_scores:
