issue_metadata:
  issue_number: "TBD"
  issue_date: "2026-03-15"
  campaign_tag: "2026-03-08-efficiency-gateway-drug"

  # -----------------------------------------------------------------------
  # INBOX HOOK — Subject + Preheader (read as one sentence)
  # -----------------------------------------------------------------------
  subject_line_options:
    - option: 1
      subject: "Your AI savings are disappearing."
      preheader: "21,000 hours gone per year. Not a technology failure. A leadership one."
      chars_subject: 34
      chars_preheader: 59
      hook_type: "Direct wound"
      ranking: 1
      rationale: "Names the loss without explanation. Preheader adds the scale and flips the blame — both land viscerally."

    - option: 2
      subject: "Your dashboard is lying to you."
      preheader: "Not about the data. About what the data is measuring."
      chars_subject: 31
      chars_preheader: 52
      hook_type: "Contrarian"
      ranking: 2
      rationale: "Creates immediate distrust of a tool every exec uses. Preheader deepens the wound without giving away the answer."

    - option: 3
      subject: "You saved the time. Now it's gone."
      preheader: "BCG found the companies chasing savings lost to the ones building things."
      chars_subject: 34
      chars_preheader: 71
      hook_type: "Story / consequence"
      ranking: 3
      rationale: "Short declarative + irony in five words. Preheader introduces the BCG data as a threat, not a statistic."

    - option: 4
      subject: "Efficiency obsession is the trap."
      preheader: "The companies that stopped chasing savings got 40% more of them."
      chars_subject: 32
      chars_preheader: 63
      hook_type: "Contrarian"
      ranking: 4
      rationale: "Strong contrarian, but leads slightly close to a stat setup. Solid B-tier option."

    - option: 5
      subject: "Your CFO is optimizing the wrong number."
      preheader: "The denominator shrank. The numerator didn't move. That's the whole problem."
      chars_subject: 40
      chars_preheader: 74
      hook_type: "Direct wound — named stakeholder"
      ranking: 5
      rationale: "Names the CFO specifically, which sharpens the wound. Slightly longer subject — works for audiences with finance background."

  recommended_subject: "Option 1"
  recommended_rationale: >
    Option 1 hits the direct-wound criteria cleanest: states the loss in four words,
    preheader adds scale (21,000 hours) and emotional reframe (leadership problem, not
    technology problem) without being explanatory. Reads as one complete thought aloud.
    Under 50 chars subject, under 100 chars preheader. Opens a wound without closing it.

  # -----------------------------------------------------------------------
  # CONTENT SUMMARY
  # -----------------------------------------------------------------------
  content_summary:
    intro_hook: "A $150 million company just proved that saving money is the wrong goal."
    intro_company: "Booking Holdings ($24B revenue, 2025 results)"
    tldr_topic: "BCG paradox — efficiency-obsessed companies lose the efficiency race to innovation-focused ones"
    myth_addressed: "Your AI dashboard shows whether AI is working"
    myth_reality: "Your measurement system is a leadership problem — tracking savings without tracking what you built"
    quick_win_action: "60-minute Capacity Dividend Audit: calculate freed hours, assign dollar value, present as capital"
    metric_introduced: "Capacity Reinvestment Ratio (CRR) — hours redirected to new output value ÷ total hours freed"
    deep_section_type: "Case Study"
    deep_section_companies:
      - "Mid-market distribution company (processing time -40%, zero differentiation)"
      - "Booking Holdings ($150M savings → $170M reinvestment → 10-17% growth)"
      - "JPMorgan Chase (COiN 360,000 hours freed → IndexGPT product development)"
    tool_included: "N"
    forward_cta_role: "VP of Operations or Head of Strategy"
    forward_cta_question: "What are we building with the hours AI is freeing up?"

  # -----------------------------------------------------------------------
  # PILLAR DISTRIBUTION
  # -----------------------------------------------------------------------
  pillar_distribution:
    strategy: "35%"
    operations: "35%"
    culture: "5%"
    roi: "25%"
    note: >
      Slightly heavy on Strategy/Operations vs. target (30/30/20/20) due to campaign topic.
      ROI above target (25% vs 20%) — justified by Capacity Dividend reinvestment thesis.
      Culture underweighted; acceptable for this issue given topic focus.

