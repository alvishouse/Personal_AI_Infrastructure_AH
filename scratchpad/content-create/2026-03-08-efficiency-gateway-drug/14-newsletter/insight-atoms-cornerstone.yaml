  - insight_atom:
      id: "atom-006-distribution-company-silence"
      source: "Cornerstone Blog - The Lemonade Stand Lie / How Capacity Dividend Walks Out the Door Section"
      source_url: null

      headline: "Order processing down 40%. CEO's question: 'What are we doing differently for customers?'"
      insight: "A distribution company deployed AI, cut processing time by 40%, celebrated the win, then had no answer when their CEO asked what changed for customers. They had freed 200 hours of human capacity per month — and had no investment thesis for it. Within six months, the freed time was absorbed into more volume of the same low-value work. Their competitor ran the same automation — but asked 'What will we build with freed capacity?' before deploying it."
      evidence: "Case study from mid-market AI engagement: 40% processing time reduction = ~200 freed hours/month = no reinvestment plan. Outcome: capacity absorbed into higher volume of existing work, zero customer differentiation achieved, zero competitive advantage created. Competitor with same tools, same savings, but with reinvestment thesis: built customer-facing logistics dashboard, won accounts on service differentiation within 12 months."
      so_what: "This is the default outcome of efficiency-first AI strategy. The question 'Did we save time?' gets a yes. The question 'What did we build with it?' gets silence. That silence is expensive — it costs you customer differentiation, revenue growth, and competitive positioning. One decision — asking the second question before the first automation — separates the treadmill from the springboard."
      action_step: "Before your next AI project deployment, write one sentence: 'When we free up X hours, we will build Y for customers.' If you can't complete that sentence, your efficiency project is incomplete. Don't deploy until you do."

      quality_scores:
