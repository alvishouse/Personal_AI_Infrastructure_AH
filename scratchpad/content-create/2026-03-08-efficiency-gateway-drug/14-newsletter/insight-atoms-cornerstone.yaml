  - insight_atom:
      id: "atom-002-capacity-dividend-evaporation"
      source: "Cornerstone Blog - The Lemonade Stand Lie / McKinsey & Research Section"
      source_url: null

      headline: "21,000 freed hours go to waste in a 100-person company every year"
      insight: "McKinsey found AI frees an average of 5.7 hours per employee per week. HBR research confirmed that 83% of organizations wasted at least a quarter of that freed time. In a 100-person company, this means roughly 21,000 hours of potential value creation are absorbed into more meetings, email, and low-value volume work instead of reinvestment."
      evidence: "McKinsey State of AI (2025-2026): 5.7 hours freed per employee per week. Only 1.7 hours redirected to value-creating work. HBR study: 83% of AI users wasted ≥25% of freed time. Among managers specifically, 36% wasted >50%. Applied to 100-person company: ~30,000 hours freed annually, ~21,000 hours wasted."
      so_what: "Your efficiency wins are creating real capacity — but your organization's default behavior is consuming it, not investing it. The freed time doesn't disappear; it gets absorbed by organizational inertia. You're printing money and accidentally leaving it on the table. This is a leadership problem, not a technology problem."
      action_step: "Calculate your company's Capacity Dividend this week: employees × 5.7 hours/week × 52 weeks. Put a dollar value on it. Then ask leadership: 'What are we actually building with this?' Document the answer. The act of asking resets the default."

      quality_scores:
        shareability: 5
