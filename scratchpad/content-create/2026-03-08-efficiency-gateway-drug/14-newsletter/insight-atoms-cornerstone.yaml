  - insight_atom:
      id: "atom-004-booking-holdings-case-study"
      source: "Cornerstone Blog - The Lemonade Stand Lie / Real-World Applications Section"
      source_url: null

      headline: "Booking Holdings reinvested $170M — more than their $150M in AI savings"
      insight: "Booking Holdings modeled $150M in cost savings from AI transformation, then immediately modeled $170M in reinvestment into new AI capabilities, their connected trip platform, and expanded fintech offerings. They treated the savings not as profit, but as innovation capital. The result: 10% YoY gross bookings growth, 11% revenue growth, and 17% EBITDA growth — in a mature company."
      evidence: "Booking Holdings 2025 results: $150M modeled AI efficiency savings, $170M reinvestment modeled before savings arrived. Outcomes: Gross bookings $166B (+10% YoY), Revenue $24B (+11%), Adjusted EBITDA $8B+ (+17%). The reinvestment plan existed before the capacity arrived — not after."
      so_what: "This is not a startup story. This is a $24B revenue company proving that reinvesting freed capacity into new offerings compounds faster than hoarding efficiency gains. If the travel industry's most mature competitor is treating AI efficiency as innovation capital, that's the template for your industry too. Efficiency without reinvestment is leaving growth on the table."
      action_step: "Study Booking's 2025 10-K filing, specifically the AI transformation section. Model your own version: 'If AI saves us $X, we'll reinvest $Y into [specific new capability]. Here's the projected revenue impact.' Present both the savings and the reinvestment plan to leadership together."

