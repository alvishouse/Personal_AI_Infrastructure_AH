  - insight_atom:
      id: "atom-003-productivity-equation-numerator"
      source: "Cornerstone Blog - The Lemonade Stand Lie / Framework Section"
      source_url: null

      headline: "Most companies optimize the denominator. Winners move the numerator."
      insight: "The productivity equation is Output Value / Input. Companies optimizing efficiency shrink the denominator (faster processes, lower costs, fewer people). Elite operators grow the numerator (better positioning, higher-value offerings, premium pricing). When competitors shrink the same denominator at the same rate, only the companies raising the numerator build a gap that widens over time."
      evidence: "McKinsey found high performers are 3x more likely to have fundamentally redesigned individual workflows. JPMorgan Chase saved 360,000 work hours annually with COiN platform — then redirected that capacity to develop IndexGPT, an entirely new AI-driven investment product. The efficiency funded the innovation. The innovation created the moat."
      so_what: "In industries where AI tools are commoditized (soon everywhere), efficiency optimization becomes table stakes — not competitive advantage. The companies that win are reinvesting freed capacity into customer innovation, new offerings, and market expansion. Your decision to grow the numerator or shrink the denominator determines whether AI is a cost play or a growth play for your business."
      action_step: "Map your top 3 AI projects. For each, write two versions of success: (1) denominator version — hours saved, costs cut, (2) numerator version — new revenue, customer value, competitive differentiation. Share both with leadership. Ask which one you're optimizing for."

      quality_scores:
        shareability: 4
        novelty: 5
        actionability: 4

      classification:
