  - insight_atom:
      id: "atom-007-four-week-implementation"
      source: "Cornerstone Blog - The Lemonade Stand Lie / How to Implement Section"
      source_url: null

      headline: "Week 1: Audit. Week 2: Decide. Week 3: Pilot. Week 4: Measure differently."
      insight: "The Capacity Dividend Framework translates into a 4-week implementation plan: Week 1 quantifies freed hours and their dollar value; Week 2 decides reinvestment priorities before capacity arrives; Week 3 pilots one team's freed capacity directed toward one output-value project; Week 4 rebuilds the measurement dashboard to track numerator metrics. This sequence breaks the efficiency-only treadmill within 30 days."
      evidence: "Week 1 Audit example: 12-person team, 6 hours/week freed per person = 3,744 hours/year = $280K in available investment capital (at fully loaded labor cost). Week 2 Decision example: 'We redirect 2,000 of those hours toward building a customer self-service portal, projected to eliminate 60% of inbound service calls.' Week 3 Pilot: 4-week live experiment with real team, real project. Week 4 Dashboard: track portal adoption rate, support ticket reduction, customer satisfaction — alongside traditional hours saved metric."
      so_what: "You don't need a 6-month transformation to escape the efficiency trap. A 4-week sprint with clear sequencing (Audit → Decision → Pilot → Measure) resets how your team thinks about AI capacity within 30 days. The shift from 'Did we save time?' to 'What did we build?' is the leading indicator that everything downstream is about to change."
      action_step: "Block 4 weeks on your calendar. Week 1: Run Capacity Dividend Audit with your team — calculate freed hours and dollar value. Week 2: Write one-page reinvestment thesis. Week 3: Launch a pilot project using freed capacity. Week 4: Rebuild your AI success dashboard. Share results with leadership."

