  - insight_atom:
      id: "atom-002"
      source: "LinkedIn Post - Case Study (Mid-Market Professional Services)"
      headline: "How 6 experiments (3 wins, 3 losses) created 18-month learning advantage"
      insight: "A 200-person professional services firm ran 6 AI experiments in 18 months: 3 succeeded, 3 failed. The 3 failures cost $47K but generated institutional knowledge about what doesn't work. The 3 successes cost $53K and locked in relationships at grandfathered pricing worth $30K/year in perpetuity. Net result: 18-month head start over competitors still debating pilots."
      evidence: "Mid-market firm documented learning from failures (vendor stability matters, integration capacity is real constraint, change management can't be afterthought). Two successful partner relationships now command 3x premium pricing in market, but firm grandfathered at original rates ($400→$1,200/month pricing gap, $800→$2,500/month). Senior consultants saved 12 hours/week through AI-powered research synthesis."
      so_what: "You don't have a $1B budget. But you can run a $100K portfolio of experiments that produces the same learning advantage as this mid-market firm. The math works: failed experiments teach you what to avoid, successful ones lock in pricing before commoditization."
      action_step: "Budget $5-10K per experiment across 5-7 pilots over 6 months. Frame as learning R&D, not vendor purchases. Explicitly plan to learn from failures about vendor stability, integration load, and team adoption needs."

      quality_scores:
