  - insight_atom:
      id: "li-005"
      source: "LinkedIn Post - Case Study Logistics"
      source_file: "post-07-case-study-logistics.md"

      headline: "How one logistics team added 30% profit and 15% retention without hiring"
      insight: "A logistics operations team replaced the 'more volume = more people' assumption with an intelligence layer. They didn't build custom software or transform existing systems—they added a layer that tracked inventory patterns, aggregated supplier data, and generated weekly reports their team had been building by hand. This freed people from grinding work to do judgment-based work."
      evidence: "90-day results: 30% reduction in inventory carrying costs, 25% improvement in on-time delivery, 15% increase in team retention. The last metric is critical—when you remove brainless work, your best people stay. When they stay, they improve faster. The team didn't shrink; it became more capable."
      so_what: "Operations teams hemorrhage their best talent because the work is grinding and repetitive. If you can measure the cost of turnover in your operation (typically 150-200% of salary for senior roles), the investment in an intelligence layer to reduce that churning pays for itself in 6-12 months—before you count the operational efficiency gains."
      action_step: "Calculate your last 12 months of operations team turnover cost (estimate 150% of each person's salary who left). Compare that to the cost of an intelligence layer redirect. If turnover cost exceeds the layer cost, the math is immediate. Use this in your CFO conversation."

