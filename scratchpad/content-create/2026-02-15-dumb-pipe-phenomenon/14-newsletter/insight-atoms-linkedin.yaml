  - insight_atom:
      id: "li-006"
      source: "LinkedIn Post - Story Post"
      source_file: "post-03-story.md"

      headline: "Changing one question got this VP promoted from crisis to COO"
      insight: "A VP of Operations at a $40M company was stuck in a losing battle: requesting headcount, being denied, watching his best analyst quit, bleeding $2.4M annually in operational inefficiency. The shift that changed everything wasn't budget approval—it was a question reframe. From 'How many people do we need?' to 'How much intelligence does each person need?' That question opened a door the CFO couldn't close."
      evidence: "The VP redirected one unfilled $75K position into an intelligence layer. 90 days later: 40% more order volume, half the error rate, zero new hires. The analyst who left wouldn't have done judgment-based work—she'd have been copying data between systems. His remaining team became decision makers instead of data processors. He was promoted to COO six months later."
      so_what: "You're not trapped in a budget battle you can't win. You're trapped in a question that closes doors. The moment you stop asking 'how many people' and start asking 'how much intelligence,' the entire frame shifts from resource constraint to capability expansion. This isn't about board approval—it's available to you right now."
      action_step: "Ask this question honestly for your team this week: 'How much intelligence does each person on my team need to handle the current volume better?' Write down what that intelligence would do. Don't worry about approval yet. Own the reframe first."

