      source: "LinkedIn Post - Framework Article"
      source_file: "post-02-framework.md"

      headline: "How 40-60% of your team's hours disappear into pattern work"
      insight: "Most operations leaders believe their teams spend 20% of time on repetitive, judgment-free work. Actual tracking reveals 40-60%. This 'Repetition Tax' is the hidden capacity problem executives miss before implementing solutions. Auditing it is step one because you automate the wrong things without it."
      evidence: "Bain research shows intelligence-driven automation delivers 18% cost savings vs 9% for simple automation. A 5-day audit tracking which tasks are 'Judgment' vs 'Pattern' reveals exactly where team hours leak. When shown these numbers, CFOs shift from adversary to partner."
      so_what: "If you jump straight to 'which AI tool should we buy?' without first measuring the Repetition Tax, you'll solve 15% of the problem and disappoint everyone. The audit is a 5-day prerequisite that changes the entire budget conversation with your CFO."
      action_step: "This week, give your team a simple 2-column log: Task Name | Judgment-or-Pattern. Collect for 5 days. Add up the Pattern hours. Share the percentage with your CFO. This single number unlocks the redirect conversation."

