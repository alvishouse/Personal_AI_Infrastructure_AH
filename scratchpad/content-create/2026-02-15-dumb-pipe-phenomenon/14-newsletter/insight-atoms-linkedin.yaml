      source: "LinkedIn Post - Quick Win CFO Redirect"
      source_file: "post-06-quick-win-cfo-redirect.md"

      headline: "One sentence converts your CFO from obstacle to champion"
      insight: "Operations leaders lose the budget battle because they ask 'I need five analysts.' CFOs hear 'add risk and payroll.' The reframe that works: 'We have an unfilled position. Redirect that salary into an intelligence layer. Same cost, more output.' This sentence shifts the CFO from adversary to designer of the solution."
      evidence: "A logistics team used this exact reframe. One unfilled position ($75K) redirected into an intelligence layer handled what three analysts would do—data aggregation, report generation, exception flagging. Result: 30% inventory cost reduction, 25% on-time delivery improvement, zero new hires. CFO became the solution's loudest champion."
      so_what: "Your next budget conversation could fail or succeed based on one sentence. If you walk in asking for headcount, the answer is no. If you walk in proposing a redirect using existing budget lines, you convert the CFO into your partner with skin in the game."
      action_step: "Identify one unfilled position the CFO already approved but won't backfill. Calculate what intelligence layer that salary could buy. Propose the redirect in the 'same cost, more output' framing. Schedule a joint design session with the CFO to shape the solution together."

