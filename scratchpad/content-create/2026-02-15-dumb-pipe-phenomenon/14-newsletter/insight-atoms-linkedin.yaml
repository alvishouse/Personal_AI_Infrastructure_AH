  - insight_atom:
      id: "li-003"
      source: "LinkedIn Post - Myth-Buster"
      source_file: "post-04-myth-buster.md"

      headline: "Headcount scaling is linear; intelligence scaling is exponential"
      insight: "For 50 years, more output = hire more people. This assumption is broken. One person adds one unit of capacity (linear). One intelligence layer compounds across your entire team (exponential). Companies scaling with headcount face a compounding disadvantage that widens every year."
      evidence: "McKinsey 2025: 55% vs 25% volume gap demonstrates compounding effect. A $40M distribution company's VP who shifted from asking 'how many people do we need' to 'how much intelligence does each person need' got promoted to COO in 18 months. Competitor still hiring headcount to solve volume—still behind."
      so_what: "Every year you scale with headcount while competitors scale intelligence, the gap widens exponentially, not arithmetically. By 2027, you won't be able to hire fast enough to catch up. This is a now-or-later decision with exponential consequences."
      action_step: "Plot your last 24 months: X-axis is headcount increases, Y-axis is revenue/volume increases. If headcount growth exceeds volume growth, you're on a doomed trajectory. Present this chart to your CFO and shift from headcount requests to 'intelligence layer' proposals."

