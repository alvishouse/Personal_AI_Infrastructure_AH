  - insight_atom:
      id: "cs-006"
      source: "Cornerstone Blog - Your Competitor Stopped Hiring. They Started Winning."
      source_section: "What Most People Get Wrong - The Myth vs Reality Section"

      headline: "Headcount scaling is linear; intelligence scaling is exponential -- the gap compounds"
      insight: "The foundational belief that 'twice the revenue requires twice the team' is not wrong, it is just outdated. This belief leads to margin compression, burnout, and speed disadvantage. The truth: headcount increases capacity linearly (hire one person, add one unit of capacity). Intelligence layers multiply capacity exponentially (one automation layer multiplies everyone's output). The companies winning now are not bigger or richer. They shifted models from linear hiring to exponential intelligence."
      evidence: "McKinsey data: AI capabilities reduce manual effort 60-70%. Early adopters handle 55% more work. Laggards handle 25%. Same team size, 30-point gap in output. The gap compounds quarterly -- laggards cannot hire fast enough to catch up. The mental model shift ('I need headcount' to 'I need intelligence per person') dissolves the budget constraint because your CFO becomes your partner."
      so_what: "Your best people are trapped on a linear growth treadmill while your competitor is building exponential advantage. The person you do not hire becomes the margin you cannot lose. But only if you redirect that budget into intelligence instead of requesting more headcount."
      action_step: "Reframe your next headcount request into a 30-minute conversation with your CFO about Intelligence-Per-Person strategy. Show the 55% vs. 25% gap. Propose redirecting one unfilled position into intelligence budget. Frame it as 'same revenue outcome at lower cost,' not 'new spending.'"

