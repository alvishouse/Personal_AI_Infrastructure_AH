      source_section: "Intelligence-Per-Person Framework (4-Step System)"

      headline: "Four-step flywheel turns denied headcount into exponential competitive advantage"
      insight: "Instead of fighting the CFO for new headcount, the winning operations leaders use a four-step Intelligence-Per-Person Framework. Audit the Repetition Tax. Redirect one unfilled position into intelligence budget. Layer intelligence onto existing systems. Compound early wins into the next layer. Each cycle multiplies what the existing team can do -- headcount stays flat while output grows exponentially."
      evidence: "Mid-market logistics company implemented this: 30% inventory cost reduction, 25% on-time delivery improvement, 15% customer retention increase using the Redirect+Layer approach. E-commerce company that started with deployment automation eventually saved $600K annually and increased deployment frequency 15x. Framework is reproducible from teams of one (personal content operations) to teams of hundreds."
      so_what: "You have already lost the headcount budget battle. Stop fighting it. Instead, use the budget you DO have to build a system where your team gets more capable every quarter. By Q3, your operation runs at a scale that would have required triple the headcount under the old hiring model."
      action_step: "Next 4 weeks: Week 1 - Audit (track time). Week 2 - Identify one highest-value repetitive process to target. Week 3 - Build one-page business case (cost of nothing vs. cost of intelligence). Week 4 - Deploy first layer and document results. Repeat for Layer 2."

