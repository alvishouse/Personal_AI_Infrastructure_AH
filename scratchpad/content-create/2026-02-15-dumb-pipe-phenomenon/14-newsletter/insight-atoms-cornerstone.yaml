      source: "Cornerstone Blog - Your Competitor Stopped Hiring. They Started Winning."
      source_section: "The Headcount Trap + Expert Story"

      headline: "The Repetition Tax is bleeding 40-60% of your team's hours"
      insight: "Most operations leaders dramatically underestimate the manual, pattern-based work consuming their team's time. When audited rigorously, 40-60% of team hours go to predictable, repetitive tasks that follow fixed rules. This 'Repetition Tax' compounds because the best people are trapped doing work that should never require human cognition."
      evidence: "A 150-employee e-commerce company discovered engineering spent 35% of time on deployment and manual testing, not building. Mid-market distribution company lost $2.4M annually to data entry, report formatting, and system reconciliation that could have been automated. The pattern holds across industries."
      so_what: "If your team is pulling 55-60 hour weeks, 20-35 of those hours are on work that can be automated. The math is simple: redirect one unfilled position's salary ($75K) into automation and recover 100+ hours per week of high-value thinking."
      action_step: "This week: Have your team track time for 5 days using a shared spreadsheet (task name, hours, 'requires judgment: yes/no'). Calculate total pattern-based hours. That number is your negotiating leverage with CFO for the intelligence budget."

