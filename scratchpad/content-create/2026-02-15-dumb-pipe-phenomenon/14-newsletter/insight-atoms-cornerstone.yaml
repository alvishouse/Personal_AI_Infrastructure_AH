  - insight_atom:
      id: "cs-004"
      source: "Cornerstone Blog - Your Competitor Stopped Hiring. They Started Winning."
      source_section: "Real-World Applications - Netflix Case Study"

      headline: "Netflix scaled 1,000x by treating infrastructure as commodity, intelligence as moat"
      insight: "Netflix did not become a $150B company by building better data centers. They migrated to AWS commodity infrastructure, then poured resources into the intelligence layer -- recommendation algorithms, content optimization, UX intelligence. The competitive moat was never in the pipes. It was in what flowed through them. This is the exact model mid-market companies should copy: use commodity tools and platforms, build differentiation in the intelligence layer above them."
      evidence: "Netflix between 2007-2015: migrated to AWS (commodity), scaled content streaming 1,000x, became $150B company. Strategy: own the intelligence layer (recommendations, optimization), treat infrastructure as utility. Same principle applies to supply chain management, order processing, and customer operations for mid-market companies."
      so_what: "Stop building custom systems to own the 'pipes.' Stop spending 18 months and $1.2M building scheduling infrastructure when vertical AI scheduling solutions are $80K/year and 6-week deployments. Build your competitive advantage in the intelligence layer that uses those commodities -- that is where the margin lives."
      action_step: "For your next major operational process: first ask 'Is there a vertical SaaS or published AI solution that already solves this?' If yes, evaluate the solution for your workflow. Only build custom if you have true differentiation above the platform, not in the infrastructure itself."

