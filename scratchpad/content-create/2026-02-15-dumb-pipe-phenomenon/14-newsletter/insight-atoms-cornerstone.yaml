      evidence: "McKinsey State of AI (2025): Early adopters handle 55% more work vs. laggards at 25%. Only 6% of organizations hit 5%+ EBIT impact from AI. Bain Automation Scorecard: Automation leaders (20%+ IT budget in intelligent automation) cut costs 17% on addressed processes. Complex intelligence-layered automation achieves 18% savings vs. 9% for simple process automation."
