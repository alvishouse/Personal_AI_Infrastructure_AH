# MEASUREMENT & OPTIMIZATION

tracking_strategy:
  metric_per_post:
    - post_number
    - impressions
    - engagement_count (likes + comments + shares)
    - golden_ratio (comments + shares / likes)
    - save_count (if available in analytics)
    - click_through_to_link (if link provided)
    - first_hour_velocity (engagement in first 60 minutes)
    - comment_sentiment (% agreement vs debate vs question)

  optimization_rules:
    - if golden_ratio < 0.10: Post underperformed, analyze comment theme for rewrite
    - if golden_ratio > 0.20: Strong engagement, consider extracting as separate post or doing follow-up
    - if first_hour_velocity slow (< 10% in first hour): Repost at different time
    - if saves_high + comments_low: Post is bookmarking material, good for awareness funnel

  a_b_testing:
    - Post 1: Test hook variations (contrarian vs question)
    - Post 2: Keep exact (story structure proven)
    - Post 3: Test carousel vs single post format
    - Post 6: Test with/without opening research stat
    - Post 7: This one drives debate - don't change

