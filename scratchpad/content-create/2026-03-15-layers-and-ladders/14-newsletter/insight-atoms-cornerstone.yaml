  - insight_atom:
      id: "atom-cornerstone-003"
      source: "Cornerstone: The Six-Layer Diagnostic"
      source_url: null

      headline: "The Layer Diagnostic tells you which foundation is weak without hiring consultants"
      insight: "A gap in any layer creates a ceiling on how high you can safely climb. Instead of guessing which AI investment will work, diagnose which layer is weak. Score all six layers (Infrastructure, Data, Process, Governance, People, Strategy) on a 1-5 scale. Your weakest layer is your ceiling. Everything else is secondary until that layer improves."
      evidence: "Organizations using the Layer Diagnostic approach can identify their primary blocker in Week 1 of a four-week process with zero external consulting cost. The diagnostic itself is an internal conversation with a scoring rubric. The first Flow Bridge costs nothing — it is documentation work. Real budget requests come after you have diagnostic evidence, which means you ask with data instead of opinions."
      so_what: "The Layer Diagnostic prevents the $500,000 pilot that dies in six months. Instead of cycling through vendors, you build specific floors. After the diagnostic, every investment has a clear target: strengthen the weakest layer blocking the next rung. Your team stops dreading the next AI initiative because the foundation is actually being built."
      action_step: "Run a 30-minute meeting with your leadership team. Score all six layers (Infrastructure, Data, Process, Governance, People, Strategy) on a 1-5 scale. The lowest score is your starting point. This single conversation clarifies which layer to strengthen before the next AI investment."

