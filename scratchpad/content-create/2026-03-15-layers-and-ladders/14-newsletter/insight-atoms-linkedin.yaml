  - insight_atom:
      id: "atom-linkedin-003"
      source: "LinkedIn Post 03 - Framework Post: Six Layers diagnostic"
      source_url: "https://www.notion.so/3250760eb0cd8156aac1ffc91076910e"

      headline: "Only 15% of companies have infrastructure ready for AI"
      insight: "Six foundational layers must exist before AI delivers ROI: Infrastructure (15% ready), Data (96% hit quality problems), Process (1% have adequate control), Governance (50% use shadow tools), People (31% say talent is ready), Strategy (focused 3.5 use cases outperform scattered 6+ by 2.1x). Weakness in any single layer becomes a hard ceiling."
      evidence: "Infrastructure readiness: 15% of all orgs vs. 71% of AI leaders. Data quality: 96% of orgs hit problems, only 15% have mature governance; those with governance see 24% revenue improvement and 25% cost savings. Process control: 1% of firms have adequate process control. Governance: 50% of employees use unapproved AI tools, average 269 shadow tools per 1,000 employees. Agentic success: organizations with mature governance keep projects operational 3+ years at double the rate of low-maturity orgs."
      so_what: "You're likely scoring well on 2-3 layers and not even aware where your ceiling is. One diagnostic conversation reveals which single layer is holding back your next $500K investment."
      action_step: "This week, have your ops team score your organization 1-5 on each of the six layers. No consultant required. Identify the one lowest score. That layer is your investment priority for Q2."

