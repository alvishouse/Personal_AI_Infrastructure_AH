  - insight_atom:
      id: "atom-linkedin-002"
      source: "LinkedIn Post 02 - Case Study Authority: Toyota foundation advantage"
      source_url: "https://www.notion.so/3250760eb0cd8188a314c4773b4bdde1"

      headline: "Toyota saved 10,000 hours annually with process-first AI"
      insight: "Toyota's agentic AI deployment for supply chain achieved 20% forecast accuracy improvement and 18% productivity gains—not because of superior models, but because decades of documented workflows existed first. A distribution company with the same software achieved 15% adoption and failed, because its processes were never formalized. The foundation, not the tool, determines outcomes."
      evidence: "Toyota Motor North America: 20% forecast accuracy improvement, 18% planner productivity gain, 10,000 hours saved annually after deploying agentic AI. Distribution company case: identical AI-powered demand forecasting tool, 15% adoption in 6 weeks, failure due to undocumented processes across 12 different planning methods."
      so_what: "Your competitor isn't winning because they have better AI—they're winning because their processes are documented. You can close that gap in 12 weeks without new software, just by mapping workflows."
      action_step: "Pick your highest-impact process (supply chain planning, customer onboarding, demand forecasting). Map current state workflows with 5-7 practitioners. Identify decision points and handoffs. Document the 'correct' method. That clarity unlocks AI ROI."

