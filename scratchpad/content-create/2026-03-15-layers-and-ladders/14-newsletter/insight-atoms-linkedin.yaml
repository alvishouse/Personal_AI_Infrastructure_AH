  - insight_atom:
      id: "atom-linkedin-005"
      source: "LinkedIn Post 06 - Myth Buster: AI success as structural readiness problem"
      source_url: "https://www.notion.so/3250760eb0cd81048dafcbe2449df674"

      headline: "Each failed AI cycle costs $500K to $2M and builds organizational scar tissue"
      insight: "Organizations that treat AI as a tool-selection problem keep cycling through failures. Each failed pilot burns $500,000 to $2,000,000 in direct and indirect costs. After 2-3 cycles, the organization develops 'AI scar tissue'—learned resistance that blocks future initiatives regardless of merit. The real problem was never the tool. It was structural readiness."
      evidence: "Cost per failed cycle: $500,000 to $2,000,000 per pilot. Pattern: leaders re-select tools after failure, assuming previous choice was wrong. Reality: 84% of failures are leadership-driven (RAND), not tool-driven. Organizations that have cycled through 2-3 failures develop resistant culture that kills subsequent initiatives even if they're sound."
      so_what: "If you've already burned $500K on a failed AI project, you can't afford another cycle the same way. The next $500K investment must be guided by layer diagnostics, not vendor promises."
      action_step: "Audit your last 3 AI projects (successful or failed). For each: name which layers were weak (Infrastructure/Data/Process/Governance/People/Strategy). Pattern will emerge. That weak layer is your investment priority for the next 90 days, not new software."

