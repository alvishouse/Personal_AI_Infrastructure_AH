  - insight_atom:
      id: "atom-linkedin-001"
      source: "LinkedIn Post 01 - Authority Post: 80% of AI projects fail"
      source_url: "https://www.notion.so/3250760eb0cd81018005ca54653f1814"

      headline: "84% of AI failures are leadership decisions, not technology"
      insight: "The 80% AI project failure rate persists despite massive improvements in technology. RAND data shows 84% of failures are leadership-driven—poor metrics, weak governance, misaligned ownership—not tool selection. The technology works 80% of the time in production. It fails before reaching production, in the data and process layers beneath it."
      evidence: "McKinsey: 88% of organizations use AI, but 74% cannot scale it. RAND: 84% of failures are leadership-driven, 73% lack clear success metrics, 68% underinvest in data governance, 61% treat AI as IT instead of business transformation."
      so_what: "If your last AI pilot died quietly, the failure wasn't the vendor's fault—it was your foundation. Your next investment will fail identically unless you diagnose which layer is weakest before committing budget."
      action_step: "Before approving your next AI project, conduct a layer diagnostic: score Infrastructure, Data, Process, Governance, People, and Strategy on 1-5 scales. Your lowest score is your ceiling. Fix that layer first, not the tool."

