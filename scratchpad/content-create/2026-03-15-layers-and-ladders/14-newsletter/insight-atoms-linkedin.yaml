  - insight_atom:
      id: "atom-linkedin-006"
      source: "LinkedIn Post 07 - Quick Win: Four-week diagnostic plan"
      source_url: "https://www.notion.so/3250760eb0cd81d6a59adb1939cb0f7e"

      headline: "Four weeks and zero budget to find your AI bottleneck"
      insight: "You don't need a $200K consultant to understand where your AI investments are failing. Run a layer diagnostic in 4 weeks with no external consultant required. Week 1: score six layers on 1-5 scales (you already know the gaps). Week 2: determine your actual maturity rung (1-6). Week 3: pick one weak layer to fix. Week 4: define one 'Flow Bridge'—a single human-to-agent handoff with clear input/output/verification/escalation. This $0 foundation unlocks every investment after."
      evidence: "Industry baseline: organizations typically sit on Rung 1-2 but believe they're on Rung 3, creating systematic misalignment in investment decisions. Framework validation: focusing on single rung progression vs. attempting all-six-layers-at-once prevents the 'back to Rung 2 after $500K spend' failure pattern."
      so_what: "You can start this week. The first investment milestone isn't buying software. It's naming your weakest layer and proving one handoff can work. That clarity resets your board conversation and your budget allocation."
      action_step: "Next Monday morning: gather 3 people (Ops, Data, IT) for 2 hours. Score your organization on the six layers. Name your current rung. Identify the single layer blocking progress to the next rung. Assign one person to define that layer's fix."

