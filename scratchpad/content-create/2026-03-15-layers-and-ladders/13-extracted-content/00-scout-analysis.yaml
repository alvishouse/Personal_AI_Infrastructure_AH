  strategic_notes: |
    CORNERSTONE EXTRACTION STRATEGY FOR "LAYERS & LADDERS"

    OUTLIER POTENTIAL: This cornerstone has exceptional LinkedIn extraction potential across 8 distinct posts, with 3 formats having HIGH engagement potential. Golden Ratio drivers are present throughout:
    - Opening contrarian stat (80% failure vs 20% for regular tech) is pattern-interrupt that stops scroll
    - Specific target personas (VP, Director, COO) create recognition comments from exact audience
    - Research stacking (McKinsey 74%, RAND 84%, Cisco 15%) creates quotable statistics
    - Toyota counter-example provides aspirational but achievable proof
    - Failure cases (Distribution Co, Copilot VP, Trust Collapse) create 'that's us' peer recognition
    - Framework layers are highly quotable in isolation
    - Diagnostic questions throughout create comment-inducting ambiguity
    - Myth-busting section contradicts vendor consensus, driving disagreement
    - Four-week plan is immediately actionable with low implementation friction

    COMPETITIVE POSITIONING: This framework explicitly positions itself against vendor narratives (tool selection vs structural readiness). This is powerful for LinkedIn because:
    - It invites leaders to share war stories of failed pilots (massive engagement)
    - It creates permission to rethink their vendor choices (resonates with regret)
    - It positions unglamorous process work as competitive advantage (appeals to operations leaders ignored by tech industry)
    - It reframes failure as diagnosis opportunity, not moral failure (psychological safety for engagement)

    OPTIMAL POSTING SEQUENCE: Post in priority order (1-8) with 3-4 day spacing to allow engagement accumulation. However, posts 5 and 7 can be serialized:
    - Priority 5 (Five Ways This Plays Out): Extract as 5 separate posts, one per week, each labeled "Case Study: [Company/Scenario]"
    - Priority 7 (Four-Week Starting Plan): Extract as 4 separate posts, one per week, labeled "Week 1: Layer Diagnostic" through "Week 4: Define Your First Flow Bridge"
    - This creates 12-week cadence with overlapping narratives that reinforce each other

    FORMAT-TO-AUDIENCE MAPPING:
    - Authority Posts (1, 2, 3, 4, 6, 8): Appeals to CXOs, VPs, Directors establishing credibility + reframing thinking
    - Framework Posts (3, 4): Appeals to analysts, consultants, researchers — highly shared and quoted
    - Case Studies (5): Appeals to peer groups (distribution leaders recognize Distribution Co, ops leaders recognize Copilot VP, etc)
    - Quick Wins (7): Appeals to doers and implementers who want immediate progress, highest share rate due to utility
    - Myth-Busting (6): Appeals to contrarians and cynics who've been burned by vendor hype, high comment disagreement

    ENGAGEMENT TRIGGER PATTERNS TO EMPHASIZE:
    - Numbers create scannable quotes: 80%, 74%, 84%, 15%, 18%, 20%, $54K, 40-50, 6 weeks, 4 weeks
    - Metaphors extend engagement: Penthouse (relatable building imagery), Foundation (structural clarity), Ladders (progression visualization)
    - Diagnoses drive engagement: "Which layer is your ceiling?" "What rung are you on?" "What's blocking you?"
    - Contrasts drive shares: Vendors vs Reality, Success vs Failure, Unglamorous vs Glamorous, Tool Selection vs Structural Readiness

