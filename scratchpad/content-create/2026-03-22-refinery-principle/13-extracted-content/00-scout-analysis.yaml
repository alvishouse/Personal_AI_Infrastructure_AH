  strategic_notes: |
    THE ROCKEFELLER PRINCIPLE IS A NEAR-PERFECT LINKEDIN CAMPAIGN SEED.

    This cornerstone has exceptional LinkedIn extraction potential for four structural reasons:

    1. BINARY REFRAME HOOK AVAILABILITY
    The cornerstone opens with the exact proven formula: "AI is not about who has the best model."
    This maps directly to the account's #1 performing post pattern. The refinery/model reframe
    is even more concrete than the structural/tool reframe that drove 36.5% engagement.
    Expect posts 01 and 07 to perform at or above that benchmark.

    2. STAT DENSITY WITH EMOTIONAL ARCHITECTURE
    95% pilot failure. 89% no productivity gain. 56% CEOs getting nothing. 80% no Layer 2 redesign.
    21% only redesigned workflows. 55% vs 18% high performer gap. 76% BCG leader-laggard gap.
    $61.95 crack spread. 34% downtime reduction. Each stat is emotionally loaded and organizationally
    relevant. Every framework post can lead with data that produces the "we are in this" recognition
    moment that drives comments.

    3. HISTORICAL STORY AS STRUCTURAL ANCHOR
    The Rockefeller arc gives the campaign a narrative backbone that data-only content lacks.
    Story posts generate higher emotional resonance scores and are shared more as "you need to
    read this" recommendations. The Jan 1872 → 90 days → 22 competitors sequence is cinematic.

    4. LAYERED FUNNEL COVERAGE
    The cornerstone naturally maps to all three funnel positions:
    - Top: Authority post (crack spread) + Story post (Rockefeller) + Myth-buster (Driller's Fallacy) + Contrarian (stop comparing models)
    - Middle: Framework post (4-Layer Model) + Case Study (manufacturer)
    - Bottom: Quick wins (Week 1 audit + Week 4 plant manager)
    This allows sequencing the campaign to move cold audiences to warm to warm audiences to conversion.

    HIGHEST RISK: Post length discipline. The cornerstone content is dense and argument-heavy.
    The biggest execution risk is posts that exceed 2,800 characters or bury the hook under
    context-setting paragraphs. Every post must lead with the most disruptive claim — not the setup.

    GROWTH LEVER: Add one first-person line in each framework post's body. "I've watched Layer 2
    absence kill three enterprise implementations firsthand" — the kind of personal stake that
    pushes emotional resonance from 9/10 to 10/10 per the benchmark analysis.

    POSTING SEQUENCE RECOMMENDATION: 01 (authority) → 03 (story) → 04 (myth-buster) → 02 (framework)
    → 06 (case study) → 07 (contrarian) → 05 (quick win 1) → 08 (quick win 2).
    Lead with the highest-engagement formats to build momentum, then deliver the deep framework
    to the audience already primed by the story and myth-buster. End with actionable quick wins
    for the audience that has moved from awareness to intent.
