      source: "LinkedIn Post - Story (Rockefeller Pattern)"
      source_url: "post-03-story-post.md"

      headline: "Rockefeller's 22 refineries in 90 days matches modern AI advantage"
      insight: "Standard Oil dominated not by drilling better wells but by controlling the conversion layer—the refineries. Modern organizations pursuing the same pattern: they're building conversion infrastructure (workflows, governance, decision protocols) while competitors chase model differentiation. Whoever controls the Layer 2 conversion controls downstream value."
      evidence: "Rockefeller acquired 22 Cleveland competitors in 90 days (January-March 1872), secured railroad shipping 40-50% below competitors' cost, and refined 90% of US oil by 1879. The crude producers with best technology lost market power to the refiner with best conversion infrastructure."
      so_what: "Your competitive advantage in 2026 doesn't come from being first to Claude 4 or GPT-5. It comes from being first to build the conversion infrastructure that no competitor can replicate in a quarter. This is a structural, not tactical, advantage."
      action_step: "Map your 3 highest-value AI outputs. For each, document the complete workflow from output generation to business decision. Identify the conversion layer owner. This documentation becomes your competitive moat."

