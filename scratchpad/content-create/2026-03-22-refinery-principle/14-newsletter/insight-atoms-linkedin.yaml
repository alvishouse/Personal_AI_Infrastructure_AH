      source: "LinkedIn Post - Authority Post (The Crack Spread)"
      source_url: "post-01-authority-post.md"

      headline: "95% of AI projects fail because refining is missing"
      insight: "Organizations deploy AI models (Layer 1) but skip the conversion layer (Layer 2) that transforms outputs into business decisions. The gap between raw AI output and refined business decision—the crack spread—determines actual value capture, not model selection."
      evidence: "95% of AI pilots never deliver measurable P&L impact; 89% of executives report no productivity gains; 56% of CEOs report zero ROI. Only 21% have redesigned workflows; 80% layer AI on existing processes without rethinking."
      so_what: "Your Q2 2026 AI budget allocation—whether you spend on models vs. workflow redesign—determines Q4 outcomes. This reframe moves AI from a technology decision to a process architecture decision."
      action_step: "Conduct immediate audit: for each AI tool your organization licenses, map outputs to decision-makers. Score each as crude (sits unused), partially refined (sometimes used), or refined (feeds documented decisions). Share results with leadership."

