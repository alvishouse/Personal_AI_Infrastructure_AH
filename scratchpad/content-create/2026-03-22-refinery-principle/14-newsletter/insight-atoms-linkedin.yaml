  - insight_atom:
      id: "atom-li-005"
      source: "LinkedIn Post - Case Study (Manufacturing)"
      source_url: "post-06-case-study.md"

      headline: "Same AI model, zero Layer 1 changes, 34% downtime reduction"
      insight: "A manufacturer deployed predictive maintenance AI with no technology upgrade, no new model, no additional data investment. The model generated alerts that went to dashboards. Results were flat. Only Layer 2 redesign occurred: alerts routed by severity, defined owners assigned, response windows tracked, outcomes fed back for model refinement. Same crude, different refinery."
      evidence: "Manufacturing case: predictive maintenance model deployed without Layer 2 redesign resulted in flat downtime. After workflow redesign (severity-based routing, owner assignment, response tracking), same model delivered 34% downtime reduction. Roland Berger parallel: customer service tool with no workflow changes = 14% usage; same tool with redesigned routing = 100% usage and 28% faster resolution."
      so_what: "You can unlock 30%+ operational gains from existing AI investments without new technology spending. This is money on the table in your current systems."
      action_step: "Select your oldest AI implementation with flat results. Map the output-to-decision workflow without judgment. Redesign for severity-based routing, clear ownership, and outcome tracking. Implement in 30 days. Measure the gap."

