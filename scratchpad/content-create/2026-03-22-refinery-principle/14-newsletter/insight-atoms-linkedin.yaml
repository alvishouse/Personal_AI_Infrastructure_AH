  - insight_atom:
      id: "atom-li-004"
      source: "LinkedIn Post - Myth Buster (Driller's Fallacy)"
      source_url: "post-04-myth-buster.md"

      headline: "Electric motors sat unused for 25 years; AI will repeat that mistake"
      insight: "Every major technology transition has the same pattern: the tool arrives, organizations acquire it, performance remains flat, then one company redesigns workflows around the tool and captures outsized returns. Electric motors took 25 years to improve factory productivity because factories bolted them onto steam-era layouts. AI is the third iteration of this pattern."
      evidence: "Electric motors commercially available in 1880s, installed by 1900, but zero productivity improvement for 25 years. Ford's assembly line in 1920s unlocked value—not because motors improved, but because factory design changed. Parallel: 95% of AI pilots fail, 80% have zero workflow changes, matching the electric motor lag pattern."
      so_what: "You have a 1-2 year window before competitors finish their workflow redesigns. The companies that compress this cycle from 25 years to 12 months will own the decade."
      action_step: "Identify one high-stakes process currently running on legacy workflow logic. Redesign that process from first principles assuming AI output is available. Measure the reengineering effort and timeline; don't wait for perfect models."

