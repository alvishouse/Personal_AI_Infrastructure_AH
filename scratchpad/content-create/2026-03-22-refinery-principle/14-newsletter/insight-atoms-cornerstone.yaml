  - insight_atom:
      id: "atom-cs-006"
      source: "Cornerstone - The Compounding Refinery Effect"
      headline: "First successful refinery creates business case for second; compound acceleration begins"
      insight: "Organizations that redesign one workflow and build a functional AI refinery unit automatically create the business case for scaling. The manufacturer who builds a Layer 2 conversion process gets 34% downtime reduction (measurable outcome). That one success changes executive perception from 'AI is a tool' to 'AI is an industrial capability.' Suddenly the second refinery is not a discretionary project — it is the obvious next move. This is how Standard Oil consolidated 90% of refining: the first successful refinery proved the model. The second scaled the moat."
      evidence: "Manufacturing case study: predictive maintenance AI with no workflow change = flat downtime. Same AI + redesigned workflow routing alerts by severity, assigning ownership, tracking response = 34% downtime reduction. McKinsey research shows first successful AI project dramatically accelerates second project. Roland Berger's 'Industrializer' companies (top 10%) start with narrow use cases with defined operational outcomes; domain leaders and frontline managers own implementation."
      so_what: "Your Q2 2026 refinery project is not about company-wide AI transformation. It is about building one proof point that workflow redesign (not tools) drives outcomes. That single success removes executive hesitation from the second project. Most organizations that get serious about Layer 2 scale from 1 refinery to 4-5 within 18 months, because each success justifies the next."
      action_step: "Commit to one 90-day refinery project with clear operational outcome metric (downtime, resolution time, cost savings). Once you achieve 20%+ improvement, immediately identify the second workflow and allocate team overlap to accelerate handoff."

