  - insight_atom:
      id: "atom-cs-003"
      source: "Cornerstone - Model Agnostic Refinery"
      headline: "Your AI infrastructure must process any model or it will lock you in"
      insight: "The US has not built a major refinery since 1977. That constraint matters because modern crude is diverse: shale, bio-based, synthetic. A refinery locked to one crude type cannot adapt. Your AI workflow infrastructure faces the same risk. Building refinery processes that depend on a specific model (Claude, GPT-4o, DeepSeek) creates structural lock-in. When the next model arrives in Q3 or your contract renews at 3x cost, your Layer 2 infrastructure must keep running unchanged. Only then is the refinery truly the moat."
      evidence: "US refinery capacity: 200 million barrels per day with no major new facility since 1977 while crude production surged. This asymmetry forces refineries to process multiple crude types. Foundation model API spending hit $12.5 billion in 2025; models are commoditizing. Anthropic 10x annual growth (2024-2026) confirms acceleration, but also margin compression. Model switching cost for layer-2-agnostic infrastructure: near-zero if designed correctly."
      so_what: "Within 24 months, your primary AI model will either change (new competitor outperforms) or change cost dramatically (provider raises prices 50-100%). If your workflows are tightly coupled to one model, you'll rebuild Layer 2. If your refinery processes any model, you swap the input and keep running. That flexibility is worth 15-20% of your AI infrastructure budget to achieve."
      action_step: "Document your three highest-value AI workflows. For each, identify hardcoded model assumptions (model name, specific prompt patterns, required output format). Create wrapper functions that make model switching transparent. Test with at least one alternate model within 90 days."

      quality_scores:
        shareability: 4
        novelty: 4
        actionability: 4

