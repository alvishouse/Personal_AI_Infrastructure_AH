  - insight_atom:
      id: "atom-cs-007"
      source: "Cornerstone - Realistic Refinery Timeline"
      headline: "Organizations take 12-18 months to move from 20% to 60% refined output"
      insight: "The refinery build is not a 90-day transformation. Realistic expectations: one decision workflow redesigned within 30 days, but organization-wide conversion from crude to refined (20% → 60% refined output) takes 12-18 months for mid-market organizations. This timeline matches historical technology adoption patterns: electricity in factories (1920s), computing in offices (2000s), cloud infrastructure (2010s). The first unit makes the case for the second, but scaling infrastructure is a multi-year commitment. Organizations expecting 90-day ROI across the organization are underestimating the structural change required."
      evidence: "Refinery build protocol recommends 4-week audit → owner identification → design → implementation cycle. But realistic expectations: first refinery produces measurable output in 30 days; organization-wide conversion from 20% refined to 60% refined takes 12-18 months. Historical tech adoption: electricity took 25 years from commercial availability (1880s) to manufacturing productivity gains (1920s). Computing took 20 years from ubiquity (1985) to measurable office productivity gains (2005)."
      so_what: "If you are starting AI refinery investment in Q1 2026, you are betting on a 12-18 month program, not a 90-day pilot. That timeline is realistic and required. Organizations that accept this commitment and allocate stable ownership (naming the refinery plant manager in week 1) get consistent results. Those waiting for a 90-day ROI prove will delay until they cannot."
      action_step: "Lock in refinery program ownership for 18 months. Do not treat it as a pilot. Budget at least two FTEs for Layer 2 design, implementation, and workflow maintenance. In month 6, measure conversion progress: target 35-40% refined output. In month 18, target 60%."

