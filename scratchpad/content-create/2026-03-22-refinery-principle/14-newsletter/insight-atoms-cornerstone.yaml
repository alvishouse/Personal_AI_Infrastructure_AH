  - insight_atom:
      id: "atom-cs-002"
      source: "Cornerstone - The 10/20/70 Inversion"
      headline: "Most AI teams invert resource allocation and wonder why nothing changes"
      insight: "BCG's resource allocation research for AI impact shows: 10% algorithms, 20% technology/data infrastructure, and 70% should go to people and process redesign. Most organizations dramatically invert this ratio: they buy the tools (tech), prepare the data, then bolt AI onto existing workflows with minimal process change. This structural inversion is why 95% of AI pilots fail to deliver P&L impact. You cannot refine crude with yesterday's cracking tower."
      evidence: "BCG resource allocation study identifies optimal split as 10% algorithms, 20% technology/data, 70% people/process. McKinsey's 2025 State of AI survey tested 25 organizational attributes and found workflow redesign had single largest effect on EBIT impact. AI leaders redesign workflows at 55% rate vs. 18% among others."
      so_what: "If your 2026 AI budget is weighted toward software licenses and data infrastructure with minimal process redesign allocation, your project has 95% failure odds regardless of which model you use. Reallocating just 10% of your AI budget from tools to organizational redesign is the highest-return investment available."
      action_step: "Audit your current AI budget allocation across: algorithms (licenses/API), technology infrastructure (data pipelines, compute), and people/process (redesign, training, ownership structure). If people/process < 60%, shift headcount and budget now. Target 70% within Q2 2026."

