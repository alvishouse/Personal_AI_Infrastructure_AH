  - insight_atom:
      id: "atom-cs-004"
      source: "Cornerstone - The Crack Spread Audit"
      headline: "Most organizations sit on 80%+ unrefined AI output with no decision pathway"
      insight: "The organizational crack spread is the gap between raw AI output and refined business decisions. An audit typically reveals 80%+ of outputs remain crude: they reach a dashboard, not a decision-maker; they influence a discussion, not a decision; nobody tracks the outcome, so nobody knows impact. This is equivalent to a refinery extracting crude from a well and dumping it in a tank. The conversion process — the refinery — is missing or improvised."
      evidence: "MIT NANDA reviewed 300+ AI initiatives: 95% never deliver P&L impact. BCG September 2025 research: leaders generate 76% higher impact match between deployment location and actual outcome. Three-question audit identifies crude vs. refined: (1) Does it reach a decision-maker? (2) Does it change a decision? (3) Does anyone track the outcome? Most organizations score 80%+ as crude."
      so_what: "You probably already have high-value AI output sitting in your systems right now. It is not being converted into decisions because the workflow is missing. Before deploying a new AI tool in Q2 2026, conduct a crack spread audit on your current deployment. Odds are you'll find 15-20% of your AI budget is trapped in unrefined output."
      action_step: "Map all current AI outputs across your organization. For each, document the decision it reaches, who makes it, and whether outcome is tracked. Flag all outputs that fail any of the three questions. That list is your refinery roadmap for the next 90 days."

