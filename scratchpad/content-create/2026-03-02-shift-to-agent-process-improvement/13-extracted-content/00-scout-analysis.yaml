cornerstone_analysis:
  title: "The One Architecture Layer Lean Never Gave You"
  total_sections: 7
  content_pillars:
    - "The Gap: Missing Discipline"
    - "The Problem: Toolkit Blind Spot"
    - "The Evidence: 95% Pilot Failure"
    - "The Framework: APA Concepts"
    - "The Tools: Flow Bridges & Drift Signals"
    - "The Case Study: 12 to 20 Posts"
    - "The Call-to-Action: Diagnostic & Next Steps"

  linkedin_format_recommendations:

    section_1:
      section_name: "You built process disciplines for everything except delegation"
      primary_format: "Authority Post (Credibility + Framework)"
      secondary_format: "Contrarian Hook"
      hook_type: "Bold Claim + Contrarian"
      funnel_position: "Top (Awareness)"
      engagement_potential: "HIGH"
      priority: 1

      core_insight: |
        You have process discipline for manufacturing, customer experience, software delivery.
        You have no process discipline for the thing that will reshape all three: handing work to AI agents.

      psychological_pattern: "Inverts expectation. Reader assumes they have covered all bases. Realizes critical gap exists. Positions speaker as authority who sees what others miss."

      engagement_drivers:
        - "Specificity: names three existing disciplines before revealing the gap"
        - "Relatability: targets process leaders who know they have methodology"
        - "Tension: gap sits in 'the one place your Lean toolkit never thought to look'"

      reusable_skeleton: |
        You have process discipline for [ESTABLISHED_DISCIPLINE_1].
        You have process discipline for [ESTABLISHED_DISCIPLINE_2].
        You have process discipline for [ESTABLISHED_DISCIPLINE_3].

        You have no process discipline for the thing that will reshape all three: [TRANSFORMATIVE_AREA].

        That is the gap. Not a [TECHNICAL_GAP]. Not a [TALENT_GAP]. A [DISCIPLINE_GAP] — sitting in the one place your [EXISTING_FRAMEWORK] never thought to look.

      adaptation_angles:
        - angle: "Operations → AI Data Governance"
          target: "Data leaders managing LLM outputs"
          engagement_potential: "HIGH"
          example: "You have data governance for databases. You have data governance for data warehouses. You have no governance framework for AI-generated data sitting in your production systems."

        - angle: "Engineering → AI Model Ops"
          target: "Engineering leaders deploying models"
          engagement_potential: "HIGH"
          example: "You have deployment standards for microservices. You have deployment standards for containerized workloads. You have no deployment discipline for the model that will reshape how your services interact."

        - angle: "HR → AI Capability Planning"
          target: "HR/talent leaders"
          engagement_potential: "MEDIUM"
          example: "You have capability frameworks for technical skills. You have capability frameworks for leadership skills. You have no framework for the skill your entire workforce needs: collaborating with AI agents."

      golden_ratio_drivers:
        - "Specificity creates conversation starters (comments asking 'what is the gap?')"
        - "Contrarian angle (opposing status quo) drives debate and shares"
        - "Naming a gap empowers people to recognize it in their own work (relatability)"

      extraction_notes: |
        This section is the cornerstone hook. It needs minimal editing for LinkedIn:
        - Cut to opening: "You have process discipline for..."
        - Remove meta-commentary ("This article gives you three things")
        - Convert closing framework names (Lean toolkit) to specific examples
        - Post as short-form (120-150 words) with strong CTA pointing to full piece

    section_2:
      section_name: "Your process toolkit has a blind spot the size of a building"
      primary_format: "Framework Post (Mental Model)"
      secondary_format: "Authority Post"
      hook_type: "Metaphor + Problem Reframe"
      funnel_position: "Middle (Consideration)"
      engagement_potential: "HIGH"
      priority: 2

      core_insight: |
        Existing frameworks (Lean, Design Thinking) were designed before AI agents.
        The gap is not about applying old frameworks to new problems — it is recognizing the old frameworks have a structural blind spot.

      psychological_pattern: "Validates reader's toolset (Lean, Design Thinking are powerful), then identifies the edge case where they fail. Creates permission to question existing models. Introduces novel framework name (APA) as solution."

      engagement_drivers:
        - "Validates without condescending: 'Both are powerful. Neither answers the question.'"
        - "Vivid metaphor: 'factory floor has safety rails; your AI agents have a prompt and a prayer'"
        - "Authority: cites McKinsey 2025 research with specific stat (2.8x)"
        - "Reframes problem: not about technology, about process"

      reusable_skeleton: |
        Every framework in your toolkit was designed before [TRANSFORMATION_EVENT].

        [FRAMEWORK_1] [WHAT_IT_DOES]. [FRAMEWORK_2] [WHAT_IT_DOES]. Both are powerful.
        Neither answers the question you are asking right now: [BLIND_SPOT_QUESTION].

        Think of it this way. Your [TRADITIONAL_SYSTEM] has [ESTABLISHED_CONTROLS].
        Your [NEW_SYSTEM] has... [ABSENCE_OF_CONTROL].

        The missing discipline is called [NEW_FRAMEWORK_NAME]. It [SOLVES_PROBLEM] by [MECHANISM].
        This is not a [SURFACE_ISSUE]. It is a [DEEPER_ISSUE].

        [INDUSTRY_RESEARCH] confirms this: [STATISTIC]. [IMPLICATION].

      adaptation_angles:
        - angle: "Sales → Deal Process Gaps"
          target: "Sales leaders deploying AI to CRM/prospecting"
          engagement_potential: "HIGH"
          example: "CRM systems were built before AI agents handled qualification. Your current gate design assumes human qualification. Your AI-augmented pipeline has... a prompt to a qualification agent. The missing discipline: Sales Process Architecture (SPA)."

        - angle: "Customer Success → AI Support Framework"
          target: "CS/Support leaders"
          engagement_potential: "MEDIUM-HIGH"
          example: "Ticketing systems were designed for human agents. Escalation paths assume human judgment. When AI handles first-line support... Research shows 91% of organizations see quality drift within 6 months."

        - angle: "Product → AI Feature Governance"
          target: "Product managers"
          engagement_potential: "MEDIUM"
          example: "Feature gates were designed for code. Feature rollout processes assume engineering handoff. When AI generates features... there is no discipline for monitoring what emerges."

      golden_ratio_drivers:
        - "Challenges reader's worldview (existing frameworks insufficient) — drives debate"
        - "Metaphor ('factory floor vs AI agents') makes content shareable and memorable"
        - "Research citation (McKinsey 2.8x stat) drives credibility and share as 'proof'"
        - "Reframing as 'discipline not technology' shifts mindset — comment-worthy take"

      extraction_notes: |
        Compress to 2-3 short paragraphs for LinkedIn.
        - Keep the factory floor metaphor (very visual)
        - Lead with "designed before" realization
        - Use McKinsey stat as proof point
        - Introduce APA name at end
        - Post length: 150-180 words

    section_3:
      section_name: "95% of AI pilots fail — and it is never the technology"
      primary_format: "Authority Post (Credibility + Evidence)"
      secondary_format: "Myth-Busting Post"
      hook_type: "Statistic + Contrarian"
      funnel_position: "Top (Awareness)"
      engagement_potential: "HIGH"
      priority: 3

      core_insight: |
        Pilots fail not due to technology, but due to process architecture.
        Three specific failure modes (compounding error, drift, optimism bias) demonstrate systematic pattern.

      psychological_pattern: "Opens with shocking statistic (95% failure). Follows with three independent proof points showing same root cause. Creates 'aha moment' that failures are predictable, therefore preventable. Authorizes reader to blame process, not tools."

      engagement_drivers:
        - "Shocking statistic: 95% failure rate (MIT NANDA Initiative)"
        - "Concrete math: 0.9 × 0.9 × 0.9 = 72.9% accuracy (UC Berkeley research)"
        - "Narrative proof: Bank model 95%→87% in 8 months with no changes"
        - "Brand example: Klarna rehiring after quality collapse"
        - "Pattern recognition: every failure traces to same cause"

      reusable_skeleton: |
        **The failure rate is structural, not anecdotal.**
        [INDUSTRY_RESEARCH] found that [FAILURE_STAT]% of [DOMAIN] [FAIL_METRIC].

        **The math is unforgiving.**
        In [MULTI_COMPONENT_SYSTEM], errors compound at every transition.
        If each [COMPONENT] performs at [BASELINE]% accuracy, the [SYSTEM] delivers [COMPOUND_RESULT]% accuracy.
        [INSTITUTION] researchers confirmed this in production: [FAILURE_DOMAIN] showed failure rates up to [FAILURE_RATE]% across [SCOPE].

        **Drift is the default state.**
        A [YEAR] [SOURCE] found that [DEGRADATION_STAT]% of [SYSTEM_TYPE] degrade over time as [CONDITION].
        [COMPANY] deployed [SYSTEM] that correctly [METRIC_1]. By [TIMEFRAME], [METRIC_2] — a [DECLINE] in [PERIOD] with no changes to [SYSTEM] itself.
        The decline was gradual, like [METAPHOR]. No [CRISIS]. No [ALERT]. Just a [SILENT_DEGRADATION].

        Every one of these failures traces to the same root cause: [ROOT_CAUSE].

      adaptation_angles:
        - angle: "Healthcare → Diagnostic AI Reliability"
          target: "Healthcare operations leaders"
          engagement_potential: "HIGH"
          example: "FDA-approved diagnostic AI shows 96% accuracy in trials. 3 months post-deployment: 89% accuracy. Same model, different patient cohorts, no alerts. 93% of organizations see quality drift in medical AI within 6 months."

        - angle: "Finance → Model Governance Failure"
          target: "Risk/compliance leaders"
          engagement_potential: "HIGH"
          example: "Credit risk model passes validation with 94% precision. 180 days later: 86% precision. Market shift, not model change. 80% of banks discovered this through external audit, not internal monitoring."

        - angle: "E-commerce → Recommendation Engine Decay"
          target: "Product/engineering leaders"
          engagement_potential: "MEDIUM-HIGH"
          example: "Personalization engine optimized for Q1 behavior. Q3 revenue drop traces to 7-month model drift as customer preferences shift. No automation caught it."

      golden_ratio_drivers:
        - "Pattern recognition: reader sees their own situation in examples"
        - "Quantified risk: specific numbers (95%, 72.9%, 8-point drop) drive urgency and shares"
        - "Metaphor escalation: Klarna example (large, well-known company) makes failure feel non-technical and inevitable"
        - "Root cause clarity: 'it was never the technology' is share-worthy contrarian take"

      extraction_notes: |
        This section is pure engagement gold. Extract as 2 posts:
        - POST 1 (SHORT): "95% of AI pilots fail—and it's never the technology" (hook + MIT stat + reframe)
        - POST 2 (MEDIUM): Three failure modes with math (compounding errors, drift, Klarna example)
        - Length: 150-180 words each
        - Lead with stat, follow with proof points
        - End with "same root cause" realization

    section_4:
      section_name: "Why AI agents fail at transitions, not tasks"
      primary_format: "Framework Post (Mental Model)"
      secondary_format: "Quick Win Post"
      hook_type: "Problem Reframe + Bold Claim"
      funnel_position: "Middle (Consideration)"
      engagement_potential: "MEDIUM-HIGH"
      priority: 4

      core_insight: |
        Risk lives in transitions between collaborators, not in individual tasks.
        Two tools (Flow Bridges and Drift Signals) map and monitor these transitions.

      psychological_pattern: "Shifts blame from task execution to system design. Introduces two simple mental models (tollbooth metaphor for bridges, vital signs for signals) that make complexity concrete. Names things that have been invisible."

      engagement_drivers:
        - "Reframe: 'risk is in the transition, not the step'"
        - "Tollbooth metaphor: makes bridge concept instantly graspable"
        - "Taxonomy clarity: four types of bridge, three types of signal"
        - "Principle-based design: Clear, Verifiable, Recoverable"
        - "Operational cadence: daily, weekly, monthly rhythm is doable"

      reusable_skeleton: |
        [FRAMEWORK_NAME] rests on two tools that work as a closed loop. One designs the [CRITICAL_TRANSITION]. The other watches for the moment that [TRANSITION] stops working.

        ### [TOOL_1_NAME] — [METAPHOR_DESCRIPTION]

        A [TOOL_1_NAME] is a [DEFINITION]. Think of it as [RELATABLE_METAPHOR].

        There are [NUMBER] types of [TOOL_1_NAME]:
        - [TYPE_1] — [description]
        - [TYPE_2] — [description]
        - [TYPE_3] — [description]

        Every strong [TOOL_1_NAME] has three properties:
        **[PROPERTY_1]** — [explanation]
        **[PROPERTY_2]** — [explanation]
        **[PROPERTY_3]** — [explanation]

        ### [TOOL_2_NAME] — [METAPHOR_DESCRIPTION]

        A [TOOL_2_NAME] is [DEFINITION]. It works like [SYSTEM_METAPHOR].

        [TOOL_2_NAME] fall into [NUMBER] distinct categories, each requiring a different response.

        **[CATEGORY_1]** — [explanation with example]
        **[CATEGORY_2]** — [explanation with example]
        **[CATEGORY_3]** — [explanation with example]

        Different [SIGNAL] types require fundamentally different responses.

        The cadence that makes [SIGNAL] operational: [RHYTHM].

      adaptation_angles:
        - angle: "Manufacturing → Quality Handoff Monitoring"
          target: "Operations/manufacturing leaders"
          engagement_potential: "MEDIUM-HIGH"
          example: "When humans hand work to robots, the risk is not in the robotic task—it is in the handoff. Quality Bridges: operator to robot, robot to QC system, QC to shipping. Drift Signals: throughput, defect patterns, cycle time drift."

        - angle: "Content Production → Editor-to-Agent Workflows"
          target: "Content leaders/marketers"
          engagement_potential: "HIGH"
          example: "First draft writing has three bridges: strategy→agent, agent→editor, editor→approval. The risk is not in agent capability; it is in whether editor knows what to review for. Drift: brand voice tone gradual shift (Performance Drift detected in week 3)."

        - angle: "Customer Data → Privacy Handoff Transitions"
          target: "Privacy/compliance officers"
          engagement_potential: "MEDIUM"
          example: "When customer data crosses from human analyst to AI processor to database, each bridge needs verification logic. Capability Drift: model begins identifying PII it previously missed. Context Drift: new regulation requires audit trails at every handoff."

      golden_ratio_drivers:
        - "Mental models (tollbooth, vital signs) are memorable and shareable"
        - "Taxonomy (4 bridge types, 3 signal types) feels comprehensive without being overwhelming"
        - "Cadence (daily, weekly, monthly) is actionable and comment-friendly ('we do 15 mins weekly')"
        - "Principle-based approach (Clear, Verifiable, Recoverable) is interview-worthy authority"

      extraction_notes: |
        Extract as 2-3 medium-length posts:
        - POST 1: Flow Bridges concept (metaphor + 4 types)
        - POST 2: Drift Signals concept (ICU monitoring analogy + 3 types)
        - POST 3 (OPTIONAL): Cadence operational rhythm (daily/weekly/monthly breakdown)
        - Length: 180-220 words each
        - Lead with reframe ("risk is in transitions")
        - Use metaphors heavily (tollbooth, ICU monitor)
        - Provide taxonomy as scannable list

    section_5:
      section_name: "From 12 to 20 posts per month — same team, new architecture"
      primary_format: "Case Study Post (Social Proof)"
      secondary_format: "Quick Win Post"
      hook_type: "Quantified Result + Contrarian (same headcount)"
      funnel_position: "Bottom (Decision)"
      engagement_potential: "HIGH"
      priority: 5

      core_insight: |
        Case study proves APA framework works in practice.
        Demonstrates all four phases (Discover, Architect, Run, Improve).
        Shows three different drift signal responses (not one-size-fits-all).

      psychological_pattern: "Builds confidence through specificity. Shows real constraints (same headcount), real workflow (B2B marketing), real problems (inconsistent quality), and real results. Three mid-workflow signals show framework is dynamic, not static. Reader can see themselves in the workflow."

      engagement_drivers:
        - "Quantified lift: 12 to 20 posts (67% increase)"
        - "Key constraint: same headcount (not solved by hiring)"
        - "Specificity: five recurring tasks, five flow bridges"
        - "Risk taxonomy: high, medium, low shown in one workflow"
        - "Real signals: three drift types with real responses"
        - "Time commitment: 2 hours/month for maintenance (not burdensome)"

      reusable_skeleton: |
        Here is [FRAMEWORK_NAME] applied to a [WORKFLOW_TYPE] workflow.

        **The problem.** [TEAM] [DELIVERS_WHAT]. [CONSTRAINT]. [DESIRED_OUTCOME].

        **Phase 1: Discover.** The team maps [NUMBER] recurring tasks: [TASKS].
        They identify where [JUDGMENT_WORK] is required ([EXAMPLES]) versus where [AGENTS_WORK] can execute ([EXAMPLES]).
        They map risk: [HIGH_RISK], [MEDIUM_RISK], [LOW_RISK].

        **Phase 2: Architect.** The team designs [NUMBER] Flow Bridges.
        Bridge [#]: [SOURCE] to [DEST] — [VERIFICATION_DEPTH].
        [Additional bridges...]

        **Phase 3: Run.** The team specifies where attention goes: [ALLOCATION]. They operate this workflow for [DURATION], logging Drift Signals throughout.

        **Phase 4: Improve.** [NUMBER] Drift Signals emerged. Each required a different response.

        [WEEK] — **[DRIFT_TYPE]** at Bridge [#]. [OBSERVATION]. Response: [ACTION].

        [Additional signal responses...]

        **The result.** Output went from [BEFORE] to [AFTER].
        Same [CONSTRAINT]. The [ROLE] spent roughly [TIME] per [PERIOD] on [FRAMEWORK] maintenance.

      adaptation_angles:
        - angle: "Customer Service → Ticket Volume Scaling"
          target: "Support/CS leaders"
          engagement_potential: "HIGH"
          example: "Team handles 150 tickets/month (same 4-person team). Route → categorize → draft response → review → send. Same workflow, new bridges with agent handling. Result: 240 tickets/month without growing team."

        - angle: "Data Analysis → Report Generation Speed"
          target: "Analytics/BI leaders"
          engagement_potential: "MEDIUM-HIGH"
          example: "Manual reporting: 20 reports/month. Six bridges from data request → agent query building → human validation → agent visualization → human sign-off → distribution. Result: 35 reports/month, same analyst team."

        - angle: "Recruitment → Candidate Pipeline Volume"
          target: "Talent acquisition leaders"
          engagement_potential: "MEDIUM"
          example: "Screening pipeline: 50 qualified candidates/month from 500 applications. Add agent screening at bridge 1 (JD to initial filter), human review at bridge 2 (borderline candidates). Result: 75 qualified candidates, same recruiting team."

      golden_ratio_drivers:
        - "Specificity creates trust: exact numbers, exact workflow, exact timeline"
        - "Three signal responses show framework is not rigid (comment-worthy: 'how do you decide which bridges to tighten?')"
        - "Constraint satisfaction: 'same headcount' is the powerful detail (shares from ops leaders)"
        - "Quantified result + methodology = authorization to try it themselves"

      extraction_notes: |
        Extract as 1-2 posts:
        - POST 1 (LONG): Full case study with all four phases (300-400 words)
        - POST 2 (SHORT, OPTIONAL): Just the result + time investment (120-150 words, driver of shares)
        - Lead with "12 to 20" result
        - Show all four phases, but keep bridges concise
        - Emphasize the three signal responses (shows framework maturity)
        - End with actionability: "How did you identify which bridges to adjust?"

    section_6:
      section_name: "You now have the name for the thing that has been frustrating you"
      primary_format: "Authority Post (Credibility + Call-to-Action)"
      secondary_format: "Quick Win Post"
      hook_type: "Validation + Permission to Act"
      funnel_position: "Bottom (Decision)"
      engagement_potential: "MEDIUM"
      priority: 6

      core_insight: |
        Reframes reader frustration as system design problem, not capability problem.
        Gives permission to stop blaming technology and start fixing process.
        Introduces diagnostic tool as next action.

      psychological_pattern: "Validates reader's experience ('agents not failing, architecture failing'). Explains what they have intuited. Provides simple tool (10-question diagnostic) to convert frustration into action. Low friction next step."

      engagement_drivers:
        - "Validation: 'Your agents are not failing. Your architecture is.'"
        - "Pattern recognition: connects all previous examples to one root cause"
        - "Empowerment: diagnostic gives reader permission and path to action"
        - "Transparency: five-minute diagnostic with clear scoring"
        - "Tiered guidance: different recommendations by score level"

      reusable_skeleton: |
        Your [DOMAIN] are not failing. Your [ARCHITECTURE] is.

        You deployed [INNOVATION] on top of processes that were never designed for [CHANGE].
        Every [FAILURE_PATTERN_1], every [FAILURE_PATTERN_2], every [FAILURE_PATTERN_3] — same root cause.

        And now it has a name. And a discipline to close it.

        The question is: where do you stand?

        **The [DIAGNOSTIC_NAME]** answers that. [NUMBER] questions. [DURATION]. The score tells you not just where you are, but where to start.

        Score each [SCALE]:
        1. [Question about current state]
        2. [Question about current state]
        ...

        **Score [RANGE_1]:** [Level 1 guidance]
        **Score [RANGE_2]:** [Level 2 guidance]
        **Score [RANGE_3]:** [Level 3 guidance]
        **Score [RANGE_4]:** [Level 4+ guidance]

        Most teams score between [TYPICAL_RANGE].
        That is not a failure. That is a starting point.

      adaptation_angles:
        - angle: "ML Ops → Model Governance Self-Assessment"
          target: "ML engineers, ML ops leaders"
          engagement_potential: "MEDIUM-HIGH"
          example: "Your models are not degrading. Your monitoring architecture is. 10-question diagnostic reveals whether your teams have drift detection, incident response, retraining cadence documentation."

        - angle: "Procurement → AI Vendor Management Readiness"
          target: "Procurement, technology leaders"
          engagement_potential: "MEDIUM"
          example: "Your AI vendor relationship is not failing. Your integration architecture is. Self-assess on documentation, handoff clarity, performance validation, escalation paths."

        - angle: "Security → AI Governance Maturity"
          target: "CISO, security operations"
          engagement_potential: "MEDIUM"
          example: "Your AI systems are not insecure. Your governance architecture is incomplete. Self-assess on auditability, human override paths, model transparency requirements, failure response."

      golden_ratio_drivers:
        - "Validation statement is powerful and shareable ('your X is not failing, your Y is')"
        - "Diagnostic tool signals actionability (not just theory)"
        - "Five-minute investment is low-friction ask (drives immediate action)"
        - "Tiered scoring provides clear starting point regardless of maturity"

      extraction_notes: |
        Extract as 1-2 posts:
        - POST 1 (MEDIUM): Validation + diagnostic introduction (200-250 words)
        - POST 2 (SHORT, OPTIONAL): Just the 10 questions with scoring guidance (150-180 words)
        - Lead with validation statement
        - Keep diagnostic questions concise
        - Include scoring interpretation (low friction)
        - CTA: "Take the diagnostic. Know where you stand."

    section_7:
      section_name: "What to do with your score"
      primary_format: "Quick Win Post"
      secondary_format: "Call-to-Action"
      hook_type: "Actionable Roadmap"
      funnel_position: "Bottom (Decision)"
      engagement_potential: "MEDIUM-LOW"
      priority: 7

      core_insight: |
        Converts diagnostic score into three sequential actions.
        Timing-based guidance (today, this week, when ready) removes friction.
        Self-directed path + professional option offered.

      psychological_pattern: "Removes analysis paralysis by providing three clear next steps. Permission to start small ('one workflow') before committing to full program. Self-service option before selling professional service."

      engagement_drivers:
        - "Temporal structure: today, this week, later removes decision fatigue"
        - "Low barrier first step: pick one workflow, design one bridge"
        - "Specificity: '5 minutes, not bureaucratic burden'"
        - "Optionality: DIY path or professional help, reader chooses"

      reusable_skeleton: |
        **Today: [IMMEDIATE_ACTION].** [Action description]. [Rationale from existing framework].

        **This week: [SHORT_TERM_ACTION].** Pick your [HIGHEST_PRIORITY] [WORKFLOW]. [Steps]. [Number] [UNIT], fully specified, teaches you more than any amount of reading.

        **When you want [OUTCOME]: [LONG_TERM_OPTION].** [Program description]. [Value proposition]. [Guiding principle].

        The organizations that will [COMPETITIVE_ADVANTAGE] are not the ones with [SURFACE_FACTOR]. They are the ones with [SYSTEM_FACTOR].

        You have [FRAMEWORK_NAME] now. You have [TOOLS] now. The only question left is [CALL_TO_ACTION].

      adaptation_angles:
        - angle: "DIY-focused version"
          target: "Bootstrap/lean operations teams"
          engagement_potential: "MEDIUM"
          example: "Today: self-assess governance maturity. This week: map your highest-volume model pipeline. When ready: we offer templates, not required service. Focus on: what you can do with existing tools first."

        - angle: "Professional-led version"
          target: "Enterprise teams"
          engagement_potential: "MEDIUM"
          example: "Today: understand your current state. This week: light audit of one critical workflow. When you want scale: structured program through Discover→Architect→Run→Improve cycle."

        - angle: "Community-driven version"
          target: "Open-source / distributed teams"
          engagement_potential: "MEDIUM-LOW"
          example: "Today: contribute your workflow to community library. This week: review and comment on others' bridge designs. When ready: shared governance patterns across orgs."

      golden_ratio_drivers:
        - "Action-oriented content is less comment-heavy but higher conversion"
        - "Optionality (DIY vs professional) speaks to different reader preferences"
        - "Temporal structure is easily scannable (low barrier to understanding)"
        - "Final restatement of competitive advantage is shareable closing"

      extraction_notes: |
        Extract as SHORT post (120-150 words):
        - Lead with "Today: Take the diagnostic"
        - Keep three-step structure (today/week/later)
        - End with "You have the framework now..." closing
        - This is bottom-funnel material (conversion, not viral)
        - Consider as part of full content arc, not standalone

  extraction_priority_order:
    post_1:
      priority: 1
      section: "section_1"
      format: "Authority Post (Contrarian Hook)"
      title_suggestion: "You have process discipline for everything except delegation"
      length: "Short (120-150 words)"
      rationale: "Strongest hook. Highest viral potential. Sets up entire narrative. Best for LinkedIn First Extract."
      engagement_potential: "HIGH"
      golden_ratio_score: "9/10"

    post_2:
      priority: 2
      section: "section_3"
      format: "Authority Post (Evidence-Based)"
      title_suggestion: "95% of AI pilots fail—and it's never the technology"
      length: "Medium (180-220 words)"
      rationale: "Shock statistic + multiple proof points. Drives urgency and debate. Second-strongest engagement hook."
      engagement_potential: "HIGH"
      golden_ratio_score: "9/10"

    post_3:
      priority: 3
      section: "section_5"
      format: "Case Study (Social Proof)"
      title_suggestion: "From 12 to 20 posts per month—same team, new architecture"
      length: "Long (300-400 words)"
      rationale: "Proof point for framework. Quantified results. Shows methodology works. Bottom-funnel credibility builder."
      engagement_potential: "HIGH"
      golden_ratio_score: "8/10"

    post_4:
      priority: 4
      section: "section_2"
      format: "Framework Post (Mental Model)"
      title_suggestion: "Your process toolkit has a blind spot—and I'll name it"
      length: "Medium (150-180 words)"
      rationale: "Introduces framework name (APA). Metaphor-rich (factory floor). High shareability. Educational content."
      engagement_potential: "HIGH"
      golden_ratio_score: "8/10"

    post_5:
      priority: 5
      section: "section_4"
      format: "Framework Post (Mental Model)"
      title_suggestion: "Flow Bridges: designing the transitions where AI fails"
      length: "Medium (200-250 words)"
      rationale: "Core tool introduction. Metaphor (tollbooth) is memorable. Can split into two posts (bridges + signals)."
