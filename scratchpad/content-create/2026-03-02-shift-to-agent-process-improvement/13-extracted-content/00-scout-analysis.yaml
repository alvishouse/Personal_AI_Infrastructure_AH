  reusable_pattern_library:

    contrarian_reframe_pattern:
      template: |
        [EXISTING SITUATION]
        But [STAKEHOLDER] never built [SYSTEM] for [NEW REALITY].

        [IMPACT STATEMENT]
        Because they have no [MISSING_PIECE].
      uses: ["section_1", "section_2", "section_6"]
      adaptation_rate: "Very High"
      note: "Strongest pattern for awareness-stage posts"

    evidence_stacking_pattern:
      template: |
        **[CLAIM]**
        [RESEARCH SOURCE 1]: [STATISTIC]. [IMPLICATION].

        **[DEEPER CLAIM]**
        [RESEARCH SOURCE 2]: [PROOF]. [MATH OR NARRATIVE].

        **[THIRD PROOF]**
        [RESEARCH SOURCE 3 OR COMPANY EXAMPLE]: [EVIDENCE].
      uses: ["section_3"]
      adaptation_rate: "High"
      note: "Creates unstoppable momentum of proof"

    metaphor_scaffolding_pattern:
      template: |
        A [CONCEPT] is a [DEFINITION].
        Think of it as [EVERYDAY_METAPHOR].

        There are [NUMBER] types of [CONCEPT]:
        - [TYPE 1]: [explanation]
        - [TYPE 2]: [explanation]
      uses: ["section_4"]
      adaptation_rate: "Very High"
      note: "Makes abstract concepts immediately graspable"

    four_phase_case_study_pattern:
      template: |
        **The problem.** [SITUATION]. [CONSTRAINT]. [DESIRED_STATE].

        **Phase 1: Discover.** The team [IDENTIFIED]. They mapped [TAXONOMY].

        **Phase 2: Architect.** The team designed [SOLUTION_STRUCTURE].

        **Phase 3: Run.** [DURATION]. [OBSERVATION_METHOD].

        **Phase 4: Improve.** [NUMBER] signals emerged. Each required [DIFFERENT_RESPONSE].

        **The result.** [METRIC IMPROVEMENT]. [KEY_DETAIL].
      uses: ["section_5"]
      adaptation_rate: "High"
      note: "Tells complete story. Shows methodology, not just results."

    validation_reframe_pattern:
      template: |
        Your [DOMAIN] are not failing.
        Your [ARCHITECTURE] is.

        You deployed [INNOVATION] on top of processes designed for [OLD_REALITY].
        Every [SYMPTOM_1], every [SYMPTOM_2], every [SYMPTOM_3]—same root cause.
      uses: ["section_6"]
      adaptation_rate: "Very High"
      note: "Powerful permission-giver. High comment potential."

    temporal_action_pattern:
      template: |
        **Today: [IMMEDIATE].**
        **This week: [SHORT_TERM].**
        **When you want [OUTCOME]: [LONG_TERM].**
      uses: ["section_7"]
      adaptation_rate: "High"
      note: "Removes decision friction. Drives action."

  content_extraction_workflow:
    phase_1_prepare:
      - "Export this YAML file to extraction team"
      - "Highlight priority 1-3 posts (highest engagement potential)"
      - "Flag reusable patterns for future content creation"
      - "Note metaphors to preserve (tollbooth, ICU monitor, factory floor)"

    phase_2_draft:
      - "Extract each post using provided skeleton template"
      - "Preserve hook and opening line exactly from cornerstone"
      - "Condense middle (evidence stacking) to fit LinkedIn format"
      - "Adapt CTA to specific format (question for engagement posts, diagnostic for CTA posts)"
      - "Write 3 LinkedIn-optimized versions of each (short, medium, long)"

    phase_3_adaptation:
      - "For each post, generate 3 adaptation angles (different industry/audience)"
      - "Test hook against adaptation angle compatibility"
      - "Flag which formats work best for each audience (ops, engineering, product, etc.)"

    phase_4_asset_generation:
      - "Create LinkedIn image prompts for top 3 posts"
      - "Design carousel structures for case study post (post_3)"
      - "Suggest video scripts for framework posts (post_4, post_5, post_6)"

    phase_5_publishing_strategy:
      - "Publish in priority order (1, 2, 3 first for maximum reach)"
      - "Space posts 3-5 days apart to avoid audience fatigue"
      - "Cross-link between posts in comments/replies"
      - "Use case study (post_3) as mid-funnel anchor; link contrarian hooks to it"

  golden_ratio_optimization:
    high_engagement_posts:
      - "section_1: Reframes expectation (debate-worthy)"
      - "section_3: Stacked evidence (share-worthy proof)"
      - "section_5: Quantified results + methodology (action-driving)"

    comment_driver_mechanics:
      - "Questions without easy answers (e.g., 'How do you detect drift before quality collapses?')"
      - "Framework naming ('Agentic Process Architecture') invites critique and discussion"
      - "Case study details invite reader to apply logic to their own situation"

    share_driver_mechanics:
      - "Contrarian takes challenge status quo (readers want to prove it to skeptics)"
      - "Quantified statistics feel authoritative and fact-checkable"
      - "Metaphors are memorable and conversation-starters"

  final_notes:
    extracted_cornerstone_value: |
      This cornerstone is extraordinarily dense with LinkedIn-extractable patterns.
      Each section is modular and can be extracted independently without losing coherence.
      Reusable skeletons are highly adaptable across industries (Ops, Engineering, Finance, Healthcare, Retail).

    pattern_library_reusability: |
      The five pattern clusters (contrarian reframe, evidence stacking, metaphor scaffolding, four-phase case study, validation reframe, temporal action)
      are industry-agnostic. Can be applied to future cornerstone content to accelerate extraction process.

    recommended_extraction_order: |
      Post 1 (hook) → Post 2 (evidence) → Post 3 (case study) creates complete narrative arc.
      Posts 4-6 (framework introduction) provide education that supports the narrative.
      Posts 7-8 (call-to-action) drive conversion.

      Publishing in this order maximizes reach (awareness posts first) and conversion (CTA posts last).
